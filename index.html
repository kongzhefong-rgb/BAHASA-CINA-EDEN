<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幼儿园 - 互动学习乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff9ed;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 3D 翻牌动画 - 竖屏 2x4 优化 */
        .memory-card {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 1/1.1; /* 接近正方形，适合 2x4 */
            cursor: pointer;
        }
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .memory-card.is-flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fde68a;
            box-shadow: 0 8px 15px -3px rgba(0,0,0,0.1);
        }
        .card-front {
            background-color: #fbbf24;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
        }
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            font-size: 1.8rem; /* 极大字体 */
            font-weight: bold;
            color: #1e3a8a;
            text-align: center;
            padding: 8px;
        }

        /* 毛毛虫头像 */
        .caterpillar-head-container {
            width: 70px;
            height: 80px;
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .caterpillar-face {
            width: 65px;
            height: 65px;
            background-color: #fb923c; 
            border: 3px solid #ea580c;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .antenna {
            position: absolute;
            top: -12px;
            width: 4px;
            height: 18px;
            background-color: #4b5563;
        }
        .antenna::after {
            content: '';
            position: absolute; top: -5px; left: -3px; width: 10px; height: 10px;
            background-color: #4b5563; border-radius: 50%;
        }
        .antenna-l { left: 18px; transform: rotate(-25deg); }
        .antenna-r { right: 18px; transform: rotate(25deg); }
        
        .eye-container { display: flex; gap: 8px; margin-top: -3px; }
        .eye { width: 12px; height: 16px; background: white; border: 2px solid #374151; border-radius: 50%; position: relative; }
        .pupil { position: absolute; width: 5px; height: 5px; background: black; border-radius: 50%; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .smile { width: 28px; height: 12px; border-bottom: 3px solid #374151; border-radius: 0 0 14px 14px; margin-top: 2px; }

        /* S型毛毛虫身体槽位 */
        .caterpillar-slot {
            width: 65px; 
            height: 65px; 
            border-radius: 50%; 
            border: 3px solid #e2e8f0; 
            background-color: #ffffff;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold;
            color: #cbd5e1; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            z-index: 10; 
            padding: 4px; 
            font-size: 1rem; 
            text-align: center; 
            line-height: 1.1;
            margin-top: -10px; /* 紧凑排列 */
        }
        .caterpillar-slot.filled { border: 4px solid rgba(0,0,0,0.05); color: white; z-index: 15; box-shadow: 0 5px 10px rgba(0,0,0,0.15); }
        
        /* 之字形偏移 */
        .zigzag-left { transform: translateX(-30px); }
        .zigzag-right { transform: translateX(30px); }
        .zigzag-center { transform: translateX(0); }

        .wiggle { animation: wiggle 2.2s infinite ease-in-out; }
        @keyframes wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .progress-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s ease; }
        .dot-active { background-color: #fbbf24; transform: scale(1.5); }
        .dot-done { background-color: #10b981; }

        .circle-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140%; height: 140%; pointer-events: none; z-index: 20; }
        .circle-path { fill: none; stroke: #ff4757; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawCircle 0.8s ease-out forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        .loading-bar { position: fixed; top: 0; left: 0; height: 6px; background: #10b981; width: 0%; z-index: 200; transition: width 1.5s linear; }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="p-2">

    <div id="auto-next-bar" class="loading-bar"></div>

    <div id="app" class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden h-[96vh] flex flex-col relative border-4 border-yellow-100 mx-auto">
        
        <!-- 顶部导航 -->
        <header id="top-bar" class="bg-gradient-to-b from-yellow-50 to-white p-4 text-center flex-shrink-0">
            <h1 class="text-xl font-bold text-blue-900 mb-1">🍭 华语学习乐园</h1>
            <div id="progress-dots" class="hidden flex justify-center gap-2">
                <div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div>
            </div>
        </header>

        <!-- 内容主区域 -->
        <main class="flex-grow overflow-y-auto no-scrollbar relative flex flex-col">
            
            <!-- 选择单元页面 -->
            <div id="unit-page" class="hidden flex-grow flex flex-col items-center justify-center p-6 space-y-6">
                <h2 class="text-2xl font-bold text-orange-600">请选择单元</h2>
                <div class="grid grid-cols-1 gap-4 w-full">
                    <button onclick="selectUnit(1)" class="p-5 bg-yellow-50 border-4 border-yellow-200 rounded-[2rem] text-left hover:bg-yellow-100 transition shadow-sm group">
                        <div class="text-4xl mb-1 group-hover:scale-110 transition">🏫</div>
                        <div class="font-bold text-lg text-yellow-800">第一单元</div>
                        <div class="text-sm text-yellow-600">开学探险日 (我的幼儿园)</div>
                    </button>
                    <button onclick="selectUnit(2)" class="p-5 bg-green-50 border-4 border-green-200 rounded-[2rem] text-left hover:bg-green-100 transition shadow-sm group">
                        <div class="text-4xl mb-1 group-hover:scale-110 transition">👫</div>
                        <div class="font-bold text-lg text-green-800">第二单元</div>
                        <div class="text-sm text-green-600">一起玩，真开心 (学习分享)</div>
                    </button>
                </div>
            </div>

            <!-- 开始启动页 -->
            <div id="start-page" class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
                <div class="text-[9rem] animate-bounce">🎒</div>
                <h2 class="text-3xl font-bold text-blue-800">准备好了吗？</h2>
                <button onclick="enterUnitSelection()" class="px-14 py-5 bg-orange-400 text-white text-2xl font-bold rounded-full shadow-xl hover:bg-orange-500 active:scale-95 transition">点击开始</button>
            </div>

            <!-- 游戏菜单 -->
            <nav id="main-menu" class="hidden p-4 grid grid-cols-2 gap-4 flex-grow content-center">
                <div id="unit-info" class="col-span-2 text-center mb-2 font-bold text-orange-500 text-lg">当前练习：第一单元</div>
                <button onclick="setupGame('memory')" class="p-5 bg-orange-50 border-b-4 border-orange-200 rounded-[1.5rem] text-center active:scale-95 transition">
                    <div class="text-5xl mb-2">🎴</div>
                    <div class="font-bold text-orange-800 text-lg">翻一翻</div>
                </button>
                <button onclick="setupGame('circle')" class="p-5 bg-green-50 border-b-4 border-green-200 rounded-[1.5rem] text-center active:scale-95 transition">
                    <div class="text-5xl mb-2">⭕</div>
                    <div class="font-bold text-green-800 text-lg">看图圈词</div>
                </button>
                <button onclick="setupGame('listening')" class="p-5 bg-blue-50 border-b-4 border-blue-200 rounded-[1.5rem] text-center active:scale-95 transition">
                    <div class="text-5xl mb-2">👂</div>
                    <div class="font-bold text-blue-800 text-lg">听音辨字</div>
                </button>
                <button onclick="setupGame('sentence')" class="p-5 bg-purple-50 border-b-4 border-purple-200 rounded-[1.5rem] text-center active:scale-95 transition">
                    <div class="text-5xl mb-2">🐛</div>
                    <div class="font-bold text-purple-800 text-lg">排句子</div>
                </button>
                <button onclick="setupGame('radical')" class="p-5 bg-pink-50 border-b-4 border-pink-200 rounded-[1.5rem] text-center active:scale-95 transition">
                    <div class="text-5xl mb-2">🏛️</div>
                    <div class="font-bold text-pink-800 text-lg">部首寻宝</div>
                </button>
                <div class="flex items-center justify-center flex-col gap-2">
                    <button onclick="toggleMusic()" id="music-btn" class="text-xl p-4 bg-gray-50 rounded-full border-2 border-gray-100 shadow-inner">🔇</button>
                    <button onclick="enterUnitSelection()" class="text-xs font-bold text-blue-500 underline">更换单元</button>
                </div>
            </nav>

            <!-- 练习场景 -->
            <div id="stage" class="hidden flex-grow flex flex-col p-4 relative overflow-hidden">
                <div id="stage-content" class="flex-grow flex flex-col items-center justify-start py-4 space-y-6"></div>
            </div>
        </main>

        <!-- 固定底部工具栏 -->
        <footer id="stage-footer" class="hidden p-5 text-center flex-shrink-0 bg-white/95 border-t border-yellow-50 z-50">
            <button onclick="backToMenu()" class="w-full py-5 bg-gray-100 text-gray-500 font-bold rounded-2xl hover:bg-gray-200 transition text-xl active:scale-95">回到主页</button>
        </footer>
    </div>

    <script>
        const unitData = {
            1: {
                title: "第一单元：开学探险日",
                vocab: [
                    { word: '幼儿园', icon: '🏫' }, { word: '老师', icon: '👩‍🏫' }, { word: '同学', icon: '👦👧' }, 
                    { word: '课室', icon: '📝🪑' }, { word: '学习角落', icon: '📚🧸' }, { word: '电脑室', icon: '🖥️💻' },
                    { word: '办公室', icon: '🏢📠' }, { word: '厕所', icon: '🚻' }, { word: '游乐场', icon: '🎠' },
                    { word: '礼堂', icon: '🏛️' }, { word: '园长', icon: '👩‍💼' }, { word: '校车司机', icon: '👨‍✈️🚌' },
                    { word: '园工', icon: '👨‍🔧🧹' }
                ],
                sentences: [
                    { parts: ['这是', '我的', '幼儿园。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
                    { parts: ['幼儿园里', '有', '课室。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
                    { parts: ['课室里', '有', '学习角落。'], colors: ['bg-purple-400', 'bg-yellow-500', 'bg-teal-400'] },
                    { parts: ['幼儿园里', '有', '电脑室', '和', '办公室。'], colors: ['bg-blue-400', 'bg-red-400', 'bg-green-400', 'bg-yellow-400', 'bg-pink-400'] },
                    { parts: ['游乐场', '旁边', '有', '厕所。'], colors: ['bg-orange-400', 'bg-teal-400', 'bg-blue-400', 'bg-red-400'] },
                    { parts: ['礼堂里', '有', '园长，', '老师和同学。'], colors: ['bg-blue-400', 'bg-green-400', 'bg-red-400', 'bg-purple-400'] }
                ],
                radical: { char: '宀', match: ['室', '家', '官', '客', '安', '守'], fail: ['园', '师', '学', '校', '工', '公'] }
            },
            2: {
                title: "第二单元：一起玩，真开心",
                vocab: [
                    { word: '打招呼', icon: '👋' }, { word: '牵手', icon: '🤝' }, { word: '轮流等待', icon: '🚶🚶' }, 
                    { word: '互相拥抱', icon: '🫂' }, { word: '分享玩具', icon: '👦👧🧸' }, { word: '玩具', icon: '🧸🧱🚂🚗' },
                    { word: '玩耍', icon: '👦⚽' }, { word: '玩伴', icon: '🧒🧒' }
                ],
                sentences: [
                    { parts: ['他们', '是', '我的', '朋友。'], colors: ['bg-blue-400', 'bg-pink-400', 'bg-yellow-500', 'bg-green-400'] },
                    { parts: ['大家', '一起排队，', '轮流等待。'], colors: ['bg-red-400', 'bg-orange-400', 'bg-yellow-400'] },
                    { parts: ['我们', '一起玩耍，', '学习', '分享和拥抱。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-indigo-400', 'bg-purple-400'] },
                    { parts: ['我和他', '是', '好朋友。'], colors: ['bg-indigo-400', 'bg-pink-400', 'bg-teal-400'] },
                    { parts: ['我们', '是', '好朋友。'], colors: ['bg-orange-400', 'bg-blue-400', 'bg-pink-400'] },
                    { parts: ['大家', '一起玩耍', '真开心。'], colors: ['bg-green-400', 'bg-red-400', 'bg-orange-400'] }
                ],
                radical: { char: '王', match: ['玩', '环', '现', '珠', '班', '球'], fail: ['打', '招', '呼', '友', '等', '开'] }
            }
        };

        let currentUnit = 1;
        let currentMode = '';
        let step = 0;
        let sessionData = [];
        let radicalFound = 0;
        let flippedCards = [];
        let matchedCount = 0;
        let isProcessing = false;
        let isMusicOn = false;

        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.05;
        const successAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const failAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN'; utter.rate = 0.6;
            if (callback) utter.onend = callback;
            window.speechSynthesis.speak(utter);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            isMusicOn = !isMusicOn;
            if (isMusicOn) { bgMusic.play(); btn.innerText = '🔊'; }
            else { bgMusic.pause(); btn.innerText = '🔇'; }
        }

        function enterUnitSelection() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('unit-page').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
        }

        function selectUnit(u) {
            currentUnit = u;
            document.getElementById('unit-page').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('unit-info').innerText = "当前单元：第" + (u === 1 ? "一" : "二") + "单元";
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
            document.getElementById('progress-dots').classList.add('hidden');
            document.getElementById('auto-next-bar').style.width = '0%';
            if (isMusicOn) bgMusic.play();
        }

        function setupGame(mode) {
            currentMode = mode; step = 0; bgMusic.pause();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('stage').classList.remove('hidden');
            document.getElementById('stage-footer').classList.remove('hidden');
            document.getElementById('progress-dots').classList.remove('hidden');
            
            const data = unitData[currentUnit];
            if (mode === 'sentence') { sessionData = [...data.sentences].sort(() => Math.random() - 0.5).slice(0, 5); }
            else if (mode === 'radical' || mode === 'memory') { sessionData = [1]; }
            else { sessionData = [...data.vocab].sort(() => Math.random() - 0.5).slice(0, 5); }
            renderStep();
        }

        function renderStep() {
            isProcessing = false;
            document.getElementById('auto-next-bar').style.width = '0%';
            const content = document.getElementById('stage-content');
            content.innerHTML = '';
            updateDots();
            const current = sessionData[step];

            if (currentMode === 'memory') renderMemoryFlip();
            else if (currentMode === 'circle') renderCircle(current);
            else if (currentMode === 'listening') renderListening(current);
            else if (currentMode === 'sentence') renderSentence(current);
            else if (currentMode === 'radical') renderRadical();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5;
            dots.forEach((dot, i) => {
                dot.classList.remove('dot-active', 'dot-done', 'hidden');
                if (i >= total) dot.classList.add('hidden');
                else if (i < step) dot.classList.add('dot-done');
                else if (i === step) dot.classList.add('dot-active');
            });
        }

        function triggerSuccessFeedback() {
            successAudio.currentTime = 0; successAudio.play().catch(()=>{});
            const bar = document.getElementById('auto-next-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(()=>{ bar.style.transition = 'width 1.5s linear'; bar.style.width = '100%'; }, 10);
            setTimeout(() => { 
                step++; 
                const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5; 
                if (step >= total) showVictory(); else renderStep(); 
            }, 1600);
        }

        function playError() {
            failAudio.currentTime = 0; failAudio.play().catch(()=>{});
        }

        // --- 翻一翻：2x4 布局 ---
        function renderMemoryFlip() {
            flippedCards = []; matchedCount = 0; isProcessing = false;
            const pool = unitData[currentUnit].vocab;
            const chosen = [...pool].sort(() => Math.random() - 0.5).slice(0, 4); // 4 对 = 8 张卡
            const cards = [];
            chosen.forEach(v => {
                cards.push({ type: 'icon', value: v.icon, matchId: v.word });
                cards.push({ type: 'word', value: v.word, matchId: v.word });
            });
            cards.sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 p-2 w-full max-w-sm">
                    ${cards.map((c, i) => `
                        <div class="memory-card" data-match="${c.matchId}" onclick="handleCardClick(this)">
                            <div class="memory-card-inner">
                                <div class="card-front">?</div>
                                <div class="card-back">${c.value}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <p class="text-orange-600 font-bold text-xl text-center mt-2">配一配，翻翻看！</p>
            `;
        }

        function handleCardClick(cardEl) {
            if (isProcessing || cardEl.classList.contains('is-flipped')) return;
            cardEl.classList.add('is-flipped');
            const matchId = cardEl.dataset.match;
            speak(matchId);
            flippedCards.push(cardEl);

            if (flippedCards.length === 2) {
                isProcessing = true;
                const [c1, c2] = flippedCards;
                if (c1.dataset.match === c2.dataset.match) {
                    setTimeout(() => {
                        c1.querySelector('.card-back').classList.add('bg-green-100', 'border-green-400');
                        c2.querySelector('.card-back').classList.add('bg-green-100', 'border-green-400');
                        matchedCount++; flippedCards = []; isProcessing = false;
                        if (matchedCount === 4) triggerSuccessFeedback();
                    }, 600);
                } else {
                    setTimeout(() => {
                        playError();
                        c1.classList.remove('is-flipped'); c2.classList.remove('is-flipped');
                        flippedCards = []; isProcessing = false;
                    }, 1100);
                }
            }
        }

        // --- 看图圈词 ---
        function renderCircle(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full px-4 space-y-10">
                    <div class="text-9xl p-10 bg-yellow-50 rounded-[4rem] border-4 border-dashed border-yellow-200 shadow-inner flex items-center justify-center min-h-[180px] min-w-[180px]">${target.icon}</div>
                    <div class="grid grid-cols-1 gap-5 w-full">
                        ${options.map(opt => `
                            <button onclick="checkCircle(this, '${opt.word}', '${target.word}')" class="relative py-7 text-3xl font-bold bg-white border-4 border-gray-100 rounded-[2rem] active:scale-95 transition shadow-lg">
                                ${opt.word}
                                <div class="circle-box hidden absolute inset-0"><svg class="circle-svg" viewBox="0 0 100 50"><ellipse cx="50" cy="25" rx="46" ry="22" class="circle-path" /></svg></div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkCircle(btn, selected, correct) {
            if (isProcessing) return;
            speak(selected);
            if (selected === correct) {
                isProcessing = true;
                btn.querySelector('.circle-box').classList.remove('hidden');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-400', 'text-red-500');
            }
        }

        // --- 听音辨字 ---
        function renderListening(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full px-4 space-y-10">
                    <button onclick="speak('${target.word}')" class="w-40 h-40 bg-blue-500 text-white rounded-full text-8xl shadow-2xl active:scale-90 flex items-center justify-center border-8 border-white">🔊</button>
                    <div class="grid grid-cols-1 gap-5 w-full">
                        ${options.map(opt => `
                            <button onclick="checkListening(this, '${opt.word}', '${target.word}')" class="py-7 text-3xl font-bold bg-white border-4 border-blue-50 rounded-[2rem] shadow-lg">
                                ${opt.word}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            speak(target.word);
        }

        function checkListening(btn, selected, correct) {
            if (isProcessing) return;
            if (selected === correct) {
                isProcessing = true;
                btn.classList.add('bg-green-500', 'text-white');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-300', 'text-red-400');
            }
        }

        // --- 排句子：S型毛毛虫 ---
        function renderSentence(data) {
            window.currentTempSentence = [];
            const shuffled = [...data.parts].sort(() => Math.random() - 0.5);
            
            // 构建毛毛虫 HTML
            let caterpillarHtml = `
                <div class="flex flex-col items-center w-full">
                    <div class="caterpillar-head-container wiggle">
                        <div class="antenna antenna-l"></div><div class="antenna antenna-r"></div>
                        <div class="caterpillar-face">
                            <div class="eye-container"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                            <div class="smile"></div>
                        </div>
                    </div>
            `;
            
            data.parts.forEach((_, i) => {
                // 之字形逻辑：center -> right -> center -> left -> center...
                let zigzagClass = 'zigzag-center';
                if (i % 4 === 1) zigzagClass = 'zigzag-right';
                if (i % 4 === 3) zigzagClass = 'zigzag-left';
                
                caterpillarHtml += `
                    <div class="caterpillar-slot wiggle ${zigzagClass}" id="slot-${i}" style="animation-delay: ${i * 0.2}s">
                        ${i + 1}
                    </div>
                `;
            });
            
            caterpillarHtml += `</div>`;

            document.getElementById('stage-content').innerHTML = `
                <div class="w-full px-2 text-center flex flex-col items-center space-y-10">
                    <div class="w-full bg-blue-50 rounded-[3rem] p-6 border-4 border-dashed border-blue-200">
                        ${caterpillarHtml}
                    </div>
                    <div class="flex flex-wrap gap-4 justify-center w-full">
                        ${shuffled.map(word => `
                            <button onclick="handleSentenceClick(this, '${word}', '${data.parts.join('')}')" 
                                    class="px-8 py-5 ${data.colors[data.parts.indexOf(word)] || 'bg-blue-400'} text-white font-bold rounded-2xl text-2xl shadow-xl active:scale-95 transition transform">
                                ${word}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function handleSentenceClick(btn, word, full) {
            if (isProcessing) return;
            speak(word);
            const slot = document.getElementById(`slot-${window.currentTempSentence.length}`);
            if (!slot) return;
            const colorClass = Array.from(btn.classList).find(c => c.startsWith('bg-'));
            slot.innerText = word; 
            slot.classList.add('filled', colorClass);
            btn.classList.add('invisible', 'pointer-events-none');
            window.currentTempSentence.push(word);

            if (window.currentTempSentence.join('') === full) {
                isProcessing = true;
                setTimeout(() => { speak(full, () => triggerSuccessFeedback()); }, 800);
            }
        }

        // --- 部首寻宝 ---
        function renderRadical() {
            radicalFound = 0;
            const rData = unitData[currentUnit].radical;
            const pool = rData.match.map(c => ({char: c, isMatch: true}))
                          .concat(rData.fail.map(c => ({char: c, isMatch: false})))
                          .sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="text-center px-2 w-full space-y-10">
                    <p class="text-3xl font-bold">找出带 <span class="text-6xl font-extrabold text-red-500 mx-1">“${rData.char}”</span> 的字：</p>
                    <div class="grid grid-cols-3 gap-5 justify-items-center">
                        ${pool.map(r => `
                            <button onclick="handleRadicalClick(this, ${r.isMatch})" 
                                    class="w-24 h-24 text-4xl font-bold bg-white border-4 border-pink-100 rounded-full flex items-center justify-center shadow-lg active:scale-95 transition">
                                ${r.char}
                            </button>
                        `).join('')}
                    </div>
                    <div id="radical-status" class="text-2xl text-pink-500 font-bold py-4 px-10 bg-pink-50 rounded-full inline-block shadow-inner">已找到：0 / 6</div>
                </div>
            `;
        }

        function handleRadicalClick(btn, isMatch) {
            if (btn.disabled || isProcessing) return;
            if (isMatch) {
                btn.disabled = true;
                btn.classList.add('bg-green-100', 'border-green-500', 'scale-110', 'text-green-700');
                radicalFound++;
                document.getElementById('radical-status').innerText = `已找到：${radicalFound} / 6`;
                speak(btn.innerText);
                if (radicalFound >= 6) { isProcessing = true; triggerSuccessFeedback(); }
            } else {
                playError();
                btn.classList.add('bg-gray-100', 'text-gray-300', 'border-gray-300');
            }
        }

        function showVictory() {
            speak("恭喜你！完成所有练习啦！");
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center p-4">
                    <div class="text-[10rem] animate-bounce mb-8">🏆</div>
                    <h2 class="text-5xl font-bold text-orange-500 mb-12">你真棒！</h2>
                    <button onclick="backToMenu()" class="px-16 py-6 bg-yellow-400 text-blue-900 text-3xl font-bold rounded-[3rem] shadow-2xl hover:scale-105 transition">返回主页</button>
                </div>
            `;
            document.getElementById('progress-dots').classList.add('hidden');
        }
    </script>
</body>
</html>
