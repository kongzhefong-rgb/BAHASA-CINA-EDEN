<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幼儿园 - 互动学习乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff9ed;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
        }

        /* 3D 翻牌动画 */
        .memory-card {
            perspective: 1000px;
            width: 70px;
            height: 95px;
            cursor: pointer;
        }
        @media (min-width: 640px) {
            .memory-card { width: 110px; height: 140px; }
        }
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .memory-card.is-flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #fde68a;
            box-shadow: 0 4px 8px -2px rgba(0,0,0,0.1);
        }
        .card-front {
            background-color: #fbbf24;
            color: white;
            font-size: 2rem;
            font-weight: bold;
        }
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            font-size: 1rem;
            text-align: center;
            padding: 4px;
        }
        @media (min-width: 640px) {
            .card-back { font-size: 1.5rem; }
        }

        /* 毛毛虫头像 */
        .caterpillar-head-container {
            width: 60px;
            height: 70px;
            position: relative;
            z-index: 30;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        @media (min-width: 640px) {
            .caterpillar-head-container { width: 90px; height: 100px; }
        }
        .caterpillar-face {
            width: 55px;
            height: 55px;
            background-color: #fb923c; 
            border: 3px solid #ea580c;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .antenna {
            position: absolute;
            top: -10px;
            width: 3px;
            height: 16px;
            background-color: #4b5563;
        }
        .antenna::after {
            content: '';
            position: absolute; top: -4px; left: -3px; width: 7px; height: 7px;
            background-color: #4b5563; border-radius: 50%;
        }
        .antenna-l { left: 16px; transform: rotate(-25deg); }
        .antenna-r { right: 16px; transform: rotate(25deg); }
        
        .eye-container { display: flex; gap: 6px; margin-top: -3px; }
        .eye { width: 10px; height: 13px; background: white; border: 1.5px solid #374151; border-radius: 50%; position: relative; }
        .pupil { position: absolute; width: 4px; height: 4px; background: black; border-radius: 50%; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .smile { width: 22px; height: 10px; border-bottom: 2px solid #374151; border-radius: 0 0 11px 11px; margin-top: 2px; }

        /* 毛毛虫身体 */
        .caterpillar-slot {
            width: 45px; height: 45px; border-radius: 50%; border: 2px solid #e2e8f0; background-color: #ffffff;
            margin-left: -8px; display: flex; align-items: center; justify-content: center; font-weight: bold;
            color: #cbd5e1; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative;
            z-index: 10; padding: 0 4px; font-size: 0.7rem; text-align: center;
        }
        @media (min-width: 640px) {
            .caterpillar-slot { width: 75px; height: 75px; margin-left: -15px; font-size: 0.9rem; border-width: 3px; }
        }
        .caterpillar-slot.filled { border: 3px solid rgba(0,0,0,0.05); color: white; z-index: 15; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .wiggle { animation: wiggle 2.2s infinite ease-in-out; }
        @keyframes wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .progress-dot { width: 10px; height: 10px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s ease; }
        .dot-active { background-color: #fbbf24; transform: scale(1.4); }
        .dot-done { background-color: #10b981; }

        .circle-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 140%; height: 140%; pointer-events: none; z-index: 20; }
        .circle-path { fill: none; stroke: #ff4757; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawCircle 0.8s ease-out forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        .loading-bar { position: fixed; top: 0; left: 0; height: 6px; background: #10b981; width: 0%; z-index: 200; transition: width 1.5s linear; }
    </style>
</head>
<body class="p-2 md:p-4 flex items-center justify-center min-h-screen">

    <div id="auto-next-bar" class="loading-bar"></div>

    <div id="app" class="w-full max-w-4xl bg-white rounded-[2.5rem] md:rounded-[3rem] shadow-2xl overflow-hidden h-[95vh] flex flex-col relative border-4 md:border-8 border-yellow-100">
        
        <header id="top-bar" class="bg-gradient-to-b from-yellow-50 to-white p-3 md:p-4 text-center flex-shrink-0">
            <h1 class="text-xl md:text-2xl font-bold text-blue-900 mb-1">🍭 华语学习乐园</h1>
            <div id="progress-dots" class="hidden flex justify-center gap-2 md:gap-4">
                <div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div>
            </div>
        </header>

        <!-- 选择单元页面 -->
        <div id="unit-page" class="hidden flex-grow flex flex-col items-center justify-center p-6 space-y-4">
            <h2 class="text-2xl md:text-3xl font-bold text-orange-600">请选择练习单元</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                <button onclick="selectUnit(1)" class="p-4 md:p-6 bg-yellow-50 border-4 border-yellow-200 rounded-[2rem] text-left hover:bg-yellow-100 transition shadow-sm group">
                    <div class="text-4xl mb-2 group-hover:scale-110 transition">🏫</div>
                    <div class="font-bold text-lg md:text-xl text-yellow-800">第一单元</div>
                    <div class="text-xs text-yellow-600">开学探险日 (我的幼儿园)</div>
                </button>
                <button onclick="selectUnit(2)" class="p-4 md:p-6 bg-green-50 border-4 border-green-200 rounded-[2rem] text-left hover:bg-green-100 transition shadow-sm group">
                    <div class="text-4xl mb-2 group-hover:scale-110 transition">👫</div>
                    <div class="font-bold text-lg md:text-xl text-green-800">第二单元</div>
                    <div class="text-xs text-green-600">一起玩，真开心 (学习分享)</div>
                </button>
            </div>
        </div>

        <div id="start-page" class="flex-grow flex flex-col items-center justify-center p-6 space-y-4 md:space-y-8">
            <div class="text-[6rem] md:text-[8rem] animate-bounce">🎒</div>
            <h2 class="text-2xl md:text-3xl font-bold text-blue-800">准备好开始了吗？</h2>
            <button onclick="enterUnitSelection()" class="px-12 md:px-16 py-4 md:py-6 bg-orange-400 text-white text-xl md:text-2xl font-bold rounded-full shadow-xl hover:bg-orange-500 active:scale-95 transition">点击开始</button>
        </div>

        <!-- 游戏菜单 -->
        <nav id="main-menu" class="hidden p-4 md:p-6 grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 flex-grow content-center overflow-y-auto">
            <div id="unit-info" class="col-span-2 md:col-span-3 text-center mb-1 font-bold text-orange-500 text-base md:text-lg">当前选择：单元 1</div>
            <button onclick="setupGame('memory')" class="p-3 md:p-4 bg-orange-50 border-b-4 md:border-b-8 border-orange-200 rounded-[1.5rem] text-center active:scale-95 transition">
                <div class="text-3xl md:text-4xl mb-2">🎴</div>
                <div class="font-bold text-orange-800 text-sm md:text-base">翻一翻</div>
            </button>
            <button onclick="setupGame('circle')" class="p-3 md:p-4 bg-green-50 border-b-4 md:border-b-8 border-green-200 rounded-[1.5rem] text-center active:scale-95 transition">
                <div class="text-3xl md:text-4xl mb-2">⭕</div>
                <div class="font-bold text-green-800 text-sm md:text-base">看图圈词</div>
            </button>
            <button onclick="setupGame('listening')" class="p-3 md:p-4 bg-blue-50 border-b-4 md:border-b-8 border-blue-200 rounded-[1.5rem] text-center active:scale-95 transition">
                <div class="text-3xl md:text-4xl mb-2">👂</div>
                <div class="font-bold text-blue-800 text-sm md:text-base">听音辨字</div>
            </button>
            <button onclick="setupGame('sentence')" class="p-3 md:p-4 bg-purple-50 border-b-4 md:border-b-8 border-purple-200 rounded-[1.5rem] text-center active:scale-95 transition">
                <div class="text-3xl md:text-4xl mb-2">🐛</div>
                <div class="font-bold text-purple-800 text-sm md:text-base">排句子</div>
            </button>
            <button onclick="setupGame('radical')" class="p-3 md:p-4 bg-pink-50 border-b-4 md:border-b-8 border-pink-200 rounded-[1.5rem] text-center active:scale-95 transition">
                <div class="text-3xl md:text-4xl mb-2">🏛️</div>
                <div class="font-bold text-pink-800 text-sm md:text-base">部首寻宝</div>
            </button>
            <div class="flex items-center justify-center flex-col gap-2">
                <button onclick="toggleMusic()" id="music-btn" class="text-xl p-3 bg-gray-50 rounded-full border-2 border-gray-100 shadow-inner">🔇</button>
                <button onclick="enterUnitSelection()" class="text-xs font-bold text-blue-500 underline">更换单元</button>
            </div>
        </nav>

        <div id="stage" class="hidden flex-grow flex flex-col p-2 relative overflow-hidden">
            <div id="stage-content" class="flex-grow flex flex-col items-center justify-center overflow-y-auto pt-2 pb-2"></div>
            <div class="p-2 md:p-4 text-center flex-shrink-0 border-t border-yellow-50 bg-white/80">
                <button onclick="backToMenu()" class="px-8 py-2 bg-gray-100 text-gray-500 font-bold rounded-full hover:bg-gray-200 transition text-sm md:text-base">回到主页</button>
            </div>
        </div>
    </div>

    <script>
        const unitData = {
            1: {
                title: "第一单元：开学探险日",
                vocab: [
                    { word: '幼儿园', icon: '🏫' }, { word: '老师', icon: '👩‍🏫' }, { word: '同学', icon: '👦👧' }, 
                    { word: '课室', icon: '📝🪑' }, { word: '学习角落', icon: '📚🧸' }, { word: '电脑室', icon: '🖥️💻' },
                    { word: '办公室', icon: '🏢📠' }, { word: '厕所', icon: '🚻' }, { word: '游乐场', icon: '🎠' },
                    { word: '礼堂', icon: '🏛️' }, { word: '园长', icon: '👩‍💼' }, { word: '校车司机', icon: '👨‍✈️🚌' },
                    { word: '园工', icon: '👨‍🔧🧹' }
                ],
                sentences: [
                    { parts: ['这是', '我的', '幼儿园。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
                    { parts: ['幼儿园里', '有', '课室。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
                    { parts: ['课室里', '有', '学习角落。'], colors: ['bg-purple-400', 'bg-yellow-500', 'bg-teal-400'] },
                    { parts: ['幼儿园里', '有', '电脑室', '和', '办公室。'], colors: ['bg-blue-400', 'bg-red-400', 'bg-green-400', 'bg-yellow-400', 'bg-pink-400'] },
                    { parts: ['游乐场', '旁边', '有', '厕所。'], colors: ['bg-orange-400', 'bg-teal-400', 'bg-blue-400', 'bg-red-400'] },
                    { parts: ['礼堂里', '有', '园长，', '老师和同学。'], colors: ['bg-blue-400', 'bg-green-400', 'bg-red-400', 'bg-purple-400'] },
                    { parts: ['校车司机', '接送', '我们', '上下学。'], colors: ['bg-indigo-400', 'bg-purple-400', 'bg-teal-400', 'bg-pink-400'] }
                ],
                radical: { char: '宀', match: ['室', '家', '官', '客', '安', '守'], fail: ['园', '师', '学', '校', '工', '公'] }
            },
            2: {
                title: "第二单元：一起玩，真开心",
                vocab: [
                    { word: '打招呼', icon: '👋' }, 
                    { word: '牵手', icon: '🤝' }, 
                    { word: '轮流等待', icon: '🚶🚶' }, 
                    { word: '互相拥抱', icon: '🏃‍♂️🫂🏃‍♀️' }, 
                    { word: '分享玩具', icon: '👦👧🧸' }, 
                    { word: '玩具', icon: '🧸🧱🚂🚗' }, // 组合了多个玩具图案
                    { word: '玩耍', icon: '👦⚽' }, 
                    { word: '玩伴', icon: '🧒🧒' }
                ],
                sentences: [
                    { parts: ['他们', '是', '我的', '朋友。'], colors: ['bg-blue-400', 'bg-pink-400', 'bg-yellow-500', 'bg-green-400'] },
                    { parts: ['大家', '一起排队，', '轮流等待。'], colors: ['bg-red-400', 'bg-orange-400', 'bg-yellow-400'] },
                    { parts: ['我们', '一起玩耍，', '学习', '分享和拥抱。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-indigo-400', 'bg-purple-400'] },
                    { parts: ['我和他', '是', '好朋友。'], colors: ['bg-indigo-400', 'bg-pink-400', 'bg-teal-400'] },
                    { parts: ['我们', '是', '好朋友。'], colors: ['bg-orange-400', 'bg-blue-400', 'bg-pink-400'] },
                    { parts: ['大家', '一起玩耍', '真开心。'], colors: ['bg-green-400', 'bg-red-400', 'bg-orange-400'] }
                ],
                radical: { char: '王', match: ['玩', '环', '现', '珠', '班', '球'], fail: ['打', '招', '呼', '友', '等', '开'] }
            }
        };

        let currentUnit = 1;
        let currentMode = '';
        let step = 0;
        let sessionData = [];
        let radicalFound = 0;
        let flippedCards = [];
        let matchedCount = 0;
        let isProcessing = false;
        let isMusicOn = false;

        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.05;
        const successAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const failAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN'; utter.rate = 0.6;
            if (callback) utter.onend = callback;
            window.speechSynthesis.speak(utter);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            isMusicOn = !isMusicOn;
            if (isMusicOn) { bgMusic.play(); btn.innerText = '🔊'; }
            else { bgMusic.pause(); btn.innerText = '🔇'; }
        }

        function enterUnitSelection() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('unit-page').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
        }

        function selectUnit(u) {
            currentUnit = u;
            document.getElementById('unit-page').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('unit-info').innerText = "当前选择：" + unitData[u].title;
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('progress-dots').classList.add('hidden');
            document.getElementById('auto-next-bar').style.width = '0%';
            if (isMusicOn) bgMusic.play();
        }

        function setupGame(mode) {
            currentMode = mode; step = 0; bgMusic.pause();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('stage').classList.remove('hidden');
            document.getElementById('progress-dots').classList.remove('hidden');
            
            const data = unitData[currentUnit];
            if (mode === 'sentence') { sessionData = [...data.sentences].sort(() => Math.random() - 0.5).slice(0, 5); }
            else if (mode === 'radical' || mode === 'memory') { sessionData = [1]; }
            else { sessionData = [...data.vocab].sort(() => Math.random() - 0.5).slice(0, 5); }
            renderStep();
        }

        function renderStep() {
            isProcessing = false;
            document.getElementById('auto-next-bar').style.width = '0%';
            const content = document.getElementById('stage-content');
            content.innerHTML = '';
            updateDots();
            const current = sessionData[step];

            if (currentMode === 'memory') renderMemoryFlip();
            else if (currentMode === 'circle') renderCircle(current);
            else if (currentMode === 'listening') renderListening(current);
            else if (currentMode === 'sentence') renderSentence(current);
            else if (currentMode === 'radical') renderRadical();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5;
            dots.forEach((dot, i) => {
                dot.classList.remove('dot-active', 'dot-done', 'hidden');
                if (i >= total) dot.classList.add('hidden');
                else if (i < step) dot.classList.add('dot-done');
                else if (i === step) dot.classList.add('dot-active');
            });
        }

        function triggerSuccessFeedback() {
            successAudio.currentTime = 0; successAudio.play().catch(()=>{});
            const bar = document.getElementById('auto-next-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(()=>{ bar.style.transition = 'width 1.5s linear'; bar.style.width = '100%'; }, 10);
            setTimeout(() => { step++; const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5; if (step >= total) showVictory(); else renderStep(); }, 1600);
        }

        function playError() {
            failAudio.currentTime = 0; failAudio.play().catch(()=>{});
        }

        // --- 翻一翻 ---
        function renderMemoryFlip() {
            flippedCards = []; matchedCount = 0; isProcessing = false;
            const pool = unitData[currentUnit].vocab;
            const chosen = [...pool].sort(() => Math.random() - 0.5).slice(0, 4);
            const cards = [];
            chosen.forEach(v => {
                cards.push({ type: 'icon', value: v.icon, matchId: v.word });
                cards.push({ type: 'word', value: v.word, matchId: v.word });
            });
            cards.sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="grid grid-cols-4 gap-2 md:gap-4 p-2 max-w-full">
                    ${cards.map((c, i) => `
                        <div class="memory-card" data-match="${c.matchId}" onclick="handleCardClick(this)">
                            <div class="memory-card-inner">
                                <div class="card-front">?</div>
                                <div class="card-back text-xs md:text-lg">${c.value}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <p class="mt-4 text-orange-600 font-bold text-lg md:text-xl text-center">把它们配成对！</p>
            `;
        }

        function handleCardClick(cardEl) {
            if (isProcessing || cardEl.classList.contains('is-flipped')) return;
            cardEl.classList.add('is-flipped');
            const matchId = cardEl.dataset.match;
            speak(matchId);
            flippedCards.push(cardEl);

            if (flippedCards.length === 2) {
                isProcessing = true;
                const [c1, c2] = flippedCards;
                if (c1.dataset.match === c2.dataset.match) {
                    setTimeout(() => {
                        c1.querySelector('.card-back').classList.add('bg-green-100', 'border-green-400');
                        c2.querySelector('.card-back').classList.add('bg-green-100', 'border-green-400');
                        matchedCount++; flippedCards = []; isProcessing = false;
                        if (matchedCount === 4) triggerSuccessFeedback();
                    }, 600);
                } else {
                    setTimeout(() => {
                        playError();
                        c1.classList.remove('is-flipped'); c2.classList.remove('is-flipped');
                        flippedCards = []; isProcessing = false;
                    }, 1200);
                }
            }
        }

        // --- 看图圈词 ---
        function renderCircle(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full px-4">
                    <div class="text-6xl md:text-8xl mb-4 p-6 bg-yellow-50 rounded-full border-2 border-dashed border-yellow-200 shadow-inner flex items-center justify-center">${target.icon}</div>
                    <div class="grid grid-cols-1 gap-3 w-full max-w-md">
                        ${options.map(opt => `
                            <button onclick="checkCircle(this, '${opt.word}', '${target.word}')" class="relative py-4 text-xl md:text-2xl font-bold bg-white border-2 border-gray-100 rounded-[1.5rem] active:scale-95 transition shadow-sm">
                                ${opt.word}
                                <div class="circle-box hidden absolute inset-0"><svg class="circle-svg" viewBox="0 0 100 50"><ellipse cx="50" cy="25" rx="46" ry="22" class="circle-path" /></svg></div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkCircle(btn, selected, correct) {
            if (isProcessing) return;
            speak(selected);
            if (selected === correct) {
                isProcessing = true;
                btn.querySelector('.circle-box').classList.remove('hidden');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-400', 'text-red-500');
            }
        }

        // --- 听音辨字 ---
        function renderListening(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full px-4">
                    <button onclick="speak('${target.word}')" class="w-24 h-24 md:w-32 md:h-32 bg-blue-500 text-white rounded-full text-5xl md:text-6xl mb-4 shadow-xl active:scale-90 flex items-center justify-center">🔊</button>
                    <div class="grid grid-cols-1 gap-3 w-full max-w-md">
                        ${options.map(opt => `
                            <button onclick="checkListening(this, '${opt.word}', '${target.word}')" class="py-4 text-xl md:text-2xl font-bold bg-white border-2 border-blue-50 rounded-[1.5rem] shadow-sm">
                                ${opt.word}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            speak(target.word);
        }

        function checkListening(btn, selected, correct) {
            if (isProcessing) return;
            if (selected === correct) {
                isProcessing = true;
                btn.classList.add('bg-green-500', 'text-white');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-300', 'text-red-400');
            }
        }

        // --- 排句子 ---
        function renderSentence(data) {
            window.currentTempSentence = [];
            const shuffled = [...data.parts].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="w-full px-4 text-center flex flex-col items-center">
                    <div class="min-h-[70px] md:min-h-[110px] w-full bg-blue-50 rounded-[2rem] p-3 mb-4 flex flex-wrap gap-0 justify-center items-center border-2 border-dashed border-blue-200">
                        <div class="caterpillar-head-container wiggle">
                            <div class="antenna antenna-l"></div><div class="antenna antenna-r"></div>
                            <div class="caterpillar-face"><div class="eye-container"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div><div class="smile"></div></div>
                        </div>
                        ${data.parts.map((_, i) => `<div class="caterpillar-slot wiggle" id="slot-${i}" style="animation-delay: ${i * 0.2}s">${i + 1}</div>`).join('')}
                    </div>
                    <div class="flex flex-wrap gap-2 md:gap-3 justify-center">
                        ${shuffled.map(word => `<button onclick="handleSentenceClick(this, '${word}', '${data.parts.join('')}')" class="px-3 py-2 ${data.colors[data.parts.indexOf(word)] || 'bg-blue-400'} text-white font-bold rounded-xl text-base md:text-xl shadow-md active:scale-90 transition transform hover:scale-105">${word}</button>`).join('')}
                    </div>
                </div>
            `;
        }

        function handleSentenceClick(btn, word, full) {
            if (isProcessing) return;
            speak(word);
            const slot = document.getElementById(`slot-${window.currentTempSentence.length}`);
            if (!slot) return;
            const colorClass = Array.from(btn.classList).find(c => c.startsWith('bg-'));
            slot.innerText = word; slot.classList.add('filled', colorClass);
            btn.classList.add('invisible', 'pointer-events-none');
            window.currentTempSentence.push(word);

            if (window.currentTempSentence.join('') === full) {
                isProcessing = true;
                setTimeout(() => { speak(full, () => triggerSuccessFeedback()); }, 800);
            }
        }

        // --- 部首寻宝 ---
        function renderRadical() {
            radicalFound = 0;
            const rData = unitData[currentUnit].radical;
            const pool = rData.match.map(c => ({char: c, isMatch: true}))
                          .concat(rData.fail.map(c => ({char: c, isMatch: false})))
                          .sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="text-center px-4 w-full">
                    <p class="text-lg md:text-xl mb-3">找出带 <span class="text-3xl md:text-5xl font-bold text-red-500 mx-1">“${rData.char}”</span> 的字：</p>
                    <div class="grid grid-cols-4 gap-2 md:gap-3 justify-items-center">${pool.map(r => `<button onclick="handleRadicalClick(this, ${r.isMatch})" class="w-14 h-14 md:w-18 md:h-18 text-xl md:text-2xl font-bold bg-white border-2 border-pink-100 rounded-full flex items-center justify-center shadow-md active:scale-90 transition">${r.char}</button>`).join('')}</div>
                    <div id="radical-status" class="mt-4 text-lg text-pink-500 font-bold py-1 px-6 bg-pink-50 rounded-full inline-block shadow-inner">已找到：0 / 6</div>
                </div>
            `;
        }

        function handleRadicalClick(btn, isMatch) {
            if (btn.disabled || isProcessing) return;
            if (isMatch) {
                btn.disabled = true;
                btn.classList.add('bg-green-100', 'border-green-500', 'scale-110', 'text-green-700');
                radicalFound++;
                document.getElementById('radical-status').innerText = `已找到：${radicalFound} / 6`;
                speak(btn.innerText);
                if (radicalFound >= 6) { isProcessing = true; triggerSuccessFeedback(); }
            } else {
                playError();
                btn.classList.add('bg-gray-100', 'text-gray-300', 'border-gray-300');
            }
        }

        function showVictory() {
            speak("恭喜你！完成所有练习啦！");
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center p-4">
                    <div class="text-[5rem] md:text-[8rem] animate-bounce mb-4">🏆</div>
                    <h2 class="text-xl md:text-3xl font-bold text-orange-500 mb-6">你真棒！</h2>
                    <button onclick="backToMenu()" class="px-10 py-3 bg-yellow-400 text-blue-900 text-lg md:text-xl font-bold rounded-[2rem] shadow-2xl hover:scale-105 transition">返回主页</button>
                </div>
            `;
            document.getElementById('progress-dots').classList.add('hidden');
        }
    </script>
</body>
</html>
