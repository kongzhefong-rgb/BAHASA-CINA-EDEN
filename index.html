<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幼儿园 - 互动学习乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff9ed;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            margin: 0;
        }

        /* 3D 翻牌动画 */
        .memory-card {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 1/1.2;
            cursor: pointer;
        }
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .memory-card.is-flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fde68a;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        .card-front {
            background-color: #fbbf24;
            color: white;
            font-size: 3rem;
            font-weight: bold;
        }
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            font-size: 3.2rem;
            font-weight: bold;
            color: #1e3a8a;
            text-align: center;
            padding: 4px;
        }

        /* 毛毛虫头像 - 横向适配 */
        .caterpillar-head-container {
            width: 55px;
            height: 65px;
            position: relative;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: -8px; 
        }
        .caterpillar-face {
            width: 50px;
            height: 50px;
            background-color: #fb923c; 
            border: 3px solid #ea580c;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .antenna {
            position: absolute;
            top: -10px;
            width: 3px;
            height: 14px;
            background-color: #4b5563;
        }
        .antenna::after {
            content: '';
            position: absolute; top: -4px; left: -2.5px; width: 8px; height: 8px;
            background-color: #4b5563; border-radius: 50%;
        }
        .antenna-l { left: 14px; transform: rotate(-25deg); }
        .antenna-r { right: 14px; transform: rotate(25deg); }
        
        .eye-container { display: flex; gap: 5px; margin-top: -3px; }
        .eye { width: 9px; height: 13px; background: white; border: 1.5px solid #374151; border-radius: 50%; position: relative; }
        .pupil { position: absolute; width: 4px; height: 4px; background: black; border-radius: 50%; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .smile { width: 20px; height: 9px; border-bottom: 2.5px solid #374151; border-radius: 0 0 10px 10px; margin-top: 1px; }

        /* 横向毛毛虫身体 */
        .caterpillar-slot {
            width: 52px; 
            height: 52px; 
            border-radius: 50%; 
            border: 2px solid #e2e8f0; 
            background-color: #ffffff;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold;
            color: #cbd5e1; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            z-index: 10; 
            font-size: 0.85rem; 
            text-align: center; 
            margin: 0 -5px; 
            cursor: pointer;
        }
        .caterpillar-slot.filled { border: 3px solid rgba(0,0,0,0.05); color: white; z-index: 15; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .wiggle { animation: wiggle 2s infinite ease-in-out; }
        @keyframes wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }

        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s ease; }
        .dot-active { background-color: #fbbf24; transform: scale(1.4); }
        .dot-done { background-color: #10b981; }

        .circle-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 130%; height: 130%; pointer-events: none; z-index: 20; }
        .circle-path { fill: none; stroke: #ff4757; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawCircle 0.8s ease-out forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        .loading-bar { position: fixed; top: 0; left: 0; height: 4px; background: #10b981; width: 0%; z-index: 200; transition: width 0.6s linear; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
    </style>
</head>
<body>

    <div id="auto-next-bar" class="loading-bar"></div>

    <div id="app" class="w-full max-md bg-white shadow-2xl overflow-hidden relative border-x-4 border-yellow-100 mx-auto">
        
        <header id="top-bar" class="bg-gradient-to-b from-yellow-50 to-white pt-5 pb-3 px-4 text-center flex-shrink-0 z-50">
            <h1 class="text-xl font-bold text-blue-900 mb-2">🍭 华语学习乐园</h1>
            <div id="progress-dots" class="hidden flex justify-center gap-1.5">
                <div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div>
            </div>
        </header>

        <main class="no-scrollbar flex flex-col">
            
            <div id="unit-page" class="hidden flex-grow flex flex-col items-center justify-start p-6 space-y-3 overflow-y-auto">
                <h2 class="text-2xl font-bold text-orange-600 mb-2">请选择单元</h2>
                <div class="grid grid-cols-1 gap-3 w-full pb-10">
                    <button onclick="selectUnit(1)" class="p-4 bg-yellow-50 border-2 border-yellow-200 rounded-[1.5rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-3xl mb-1">🏫</div>
                        <div class="font-bold text-yellow-800 text-lg">第一单元：我的幼儿园</div>
                    </button>
                    <button onclick="selectUnit(2)" class="p-4 bg-green-50 border-2 border-green-200 rounded-[1.5rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-3xl mb-1">👫</div>
                        <div class="font-bold text-green-800 text-lg">第二单元：一起玩，真开心</div>
                    </button>
                    <button onclick="selectUnit(3)" class="p-4 bg-red-50 border-2 border-red-200 rounded-[1.5rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-3xl mb-1">🏠</div>
                        <div class="font-bold text-red-800 text-lg">第三单元：家是爱的港湾</div>
                    </button>
                    <button onclick="selectUnit(4)" class="p-4 bg-purple-50 border-2 border-purple-200 rounded-[1.5rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-3xl mb-1">🎒✏️</div>
                        <div class="font-bold text-purple-800 text-lg">第四单元：我的神奇书包</div>
                    </button>
                </div>
            </div>

            <div id="start-page" class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
                <div class="text-[8rem] animate-bounce">🎒</div>
                <h2 class="text-3xl font-bold text-blue-800">准备好了吗？</h2>
                <button onclick="enterUnitSelection()" class="px-12 py-5 bg-orange-400 text-white text-2xl font-bold rounded-full shadow-lg active:scale-95 transition">点击开始</button>
            </div>

            <nav id="main-menu" class="hidden p-4 grid grid-cols-2 gap-3 flex-grow content-center">
                <div id="unit-info" class="col-span-2 text-center mb-1 font-bold text-orange-500 text-sm">当前练习：第一单元</div>
                <button onclick="setupGame('memory')" class="p-4 bg-orange-50 border-b-4 border-orange-200 rounded-[1.25rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-4xl mb-1">🎴</div>
                    <div class="font-bold text-orange-800 text-sm">翻一翻</div>
                </button>
                <button onclick="setupGame('circle')" class="p-4 bg-green-50 border-b-4 border-green-200 rounded-[1.25rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-4xl mb-1">⭕</div>
                    <div class="font-bold text-green-800 text-sm">看图圈词</div>
                </button>
                <button onclick="setupGame('listening')" class="p-4 bg-blue-50 border-b-4 border-blue-200 rounded-[1.25rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-4xl mb-1">👂</div>
                    <div class="font-bold text-blue-800 text-sm">听音辨字</div>
                </button>
                <button onclick="setupGame('sentence')" class="p-4 bg-purple-50 border-b-4 border-purple-200 rounded-[1.25rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-4xl mb-1">🐛</div>
                    <div class="font-bold text-purple-800 text-sm">排句子</div>
                </button>
                <button onclick="setupGame('radical')" class="p-4 bg-pink-50 border-b-4 border-pink-200 rounded-[1.25rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-4xl mb-1">🏛️</div>
                    <div class="font-bold text-pink-800 text-sm">部首寻宝</div>
                </button>
                <div class="flex items-center justify-center flex-col gap-1">
                    <button onclick="toggleMusic()" id="music-btn" class="text-lg p-3 bg-gray-50 rounded-full border-2 border-gray-100 shadow-inner">🔇</button>
                    <button onclick="enterUnitSelection()" class="text-[10px] font-bold text-blue-500 underline">更换单元</button>
                </div>
            </nav>

            <div id="stage" class="hidden flex-grow flex flex-col p-3 relative overflow-hidden">
                <div id="stage-content" class="flex-grow flex flex-col items-center justify-start space-y-4 pt-2"></div>
            </div>
        </main>

        <footer id="stage-footer" class="hidden p-4 text-center flex-shrink-0 bg-white border-t-2 border-yellow-50 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
            <button onclick="backToMenu()" class="w-full py-3 bg-gray-100 text-gray-500 font-bold rounded-xl active:scale-95 transition text-base">回到主页</button>
        </footer>
    </div>

    <script>
        const unitData = {
            1: {
                title: "第一单元：我的幼儿园",
                vocab: [
                    { word: '幼儿园', icon: '🏫' }, { word: '老师', icon: '👩‍🏫' }, { word: '同学', icon: '👦👧' }, 
                    { word: '课室', icon: '📝🪑' }, { word: '学习角落', icon: '📚🧸' }, { word: '电脑室', icon: '🖥️💻' }
                ],
                sentences: [
                    { parts: ['这是', '我的', '幼儿园。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
                    { parts: ['幼儿园里', '有', '课室。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
                    { parts: ['这是', '老师。'], colors: ['bg-blue-400', 'bg-red-400'] },
                    { parts: ['这是', '我的', '课室。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-purple-400'] },
                    { parts: ['幼儿园里', '有同学。'], colors: ['bg-orange-400', 'bg-teal-400'] }
                ],
                radical: [{ char: '宀', match: ['室', '家', '官', '客', '安', '守'], fail: ['园', '师', '学', '校', '工', '公'] }]
            },
            2: {
                title: "第二单元：一起玩，真开心",
                vocab: [
                    { word: '打招呼', icon: '👋' }, { word: '牵手', icon: '🤝' }, { word: '玩具', icon: '🧸🧱🚂' }, 
                    { word: '玩耍', icon: '👦⚽' }
                ],
                sentences: [
                    { parts: ['大家', '一起排队，', '轮流等待。'], colors: ['bg-red-400', 'bg-orange-400', 'bg-yellow-400'] },
                    { parts: ['我们', '一起', '玩耍。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-red-400'] },
                    { parts: ['这是', '我的', '玩具。'], colors: ['bg-pink-400', 'bg-indigo-400', 'bg-teal-400'] },
                    { parts: ['大家', '分享玩具。'], colors: ['bg-orange-400', 'bg-blue-400'] },
                    { parts: ['我们', '打招呼。'], colors: ['bg-indigo-400', 'bg-red-400'] }
                ],
                radical: [{ char: '王', match: ['玩', '环', '现', '珠', '班', '球'], fail: ['打', '招', '呼', '友', '等', '开'] }]
            },
            3: {
                title: "第三单元：家是爱的港湾",
                vocab: [
                    { word: '爷爷', icon: '👴🪴' }, { word: '奶奶', icon: '👵🚿' }, { word: '爸爸', icon: '👨🚗' }, 
                    { word: '妈妈', icon: '👩🍳' }, { word: '洗碗', icon: '🥣🧼' }, { word: '洗车', icon: '🚗🧼' }
                ],
                sentences: [
                    { parts: ['爷爷', '在', '种花。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
                    { parts: ['奶奶', '在', '浇花。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
                    { parts: ['妈妈', '在', '煮菜。'], colors: ['bg-blue-400', 'bg-green-400', 'bg-red-400'] },
                    { parts: ['爸爸', '在', '洗车。'], colors: ['bg-orange-400', 'bg-teal-400', 'bg-blue-400'] },
                    { parts: ['外婆', '在', '洗碗。'], colors: ['bg-purple-400', 'bg-pink-400', 'bg-teal-400'] }
                ],
                radical: [{ char: '氵', match: ['洗', '浇', '洒', '池', '汽', '汁'], fail: ['爷', '爸', '妈', '姐', '弟', '公'] }]
            },
            4: {
                title: "第四单元：我的神奇书包",
                vocab: [
                    { word: '书本', icon: '📚' }, { word: '颜色笔', icon: '🖍️' }, { word: '尺', icon: '📏' }, 
                    { word: '剪刀', icon: '✂️' }, { word: '铅笔', icon: '✏️' }
                ],
                sentences: [
                    { parts: ['这是', '我的', '书包。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-purple-400'] },
                    { parts: ['书包里', '有书本。'], colors: ['bg-orange-400', 'bg-blue-400'] },
                    { parts: ['书包里', '有', '颜色笔。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-teal-400'] },
                    { parts: ['我', '喜欢', '我的', '神奇书包。'], colors: ['bg-pink-400', 'bg-indigo-400', 'bg-yellow-500', 'bg-green-400'] },
                    { parts: ['书包里有', '铅笔、尺', '和剪刀。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-indigo-400'] }
                ],
                radical: [{ char: '竹', match: ['笔', '简', '等', '箱', '笑', '答'], fail: ['书', '尺', '刀', '剪', '单'] }]
            }
        };

        let currentUnit = 1;
        let currentMode = '';
        let step = 0;
        let sessionData = [];
        let radicalFound = 0;
        let flippedCards = [];
        let matchedCount = 0;
        let isProcessing = false;
        let isMusicOn = false;
        let isTransitioning = false;

        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.05;
        const successAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const failAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

        function speak(text, callback) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN'; utter.rate = 0.65; utter.pitch = 1.1;
            let hasCalledBack = false;
            const safeCallback = () => {
                if (!hasCalledBack) { hasCalledBack = true; if (callback) callback(); }
            };
            if (callback) {
                utter.onend = safeCallback;
                utter.onerror = safeCallback;
                setTimeout(safeCallback, 3500);
            }
            window.speechSynthesis.speak(utter);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            isMusicOn = !isMusicOn;
            if (isMusicOn) { bgMusic.play(); btn.innerText = '🔊'; }
            else { bgMusic.pause(); btn.innerText = '🔇'; }
        }

        function enterUnitSelection() {
            speak(' ');
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('unit-page').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
        }

        function selectUnit(u) {
            currentUnit = u;
            document.getElementById('unit-page').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('unit-info').innerText = "当前练习：" + unitData[u].title;
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
            document.getElementById('progress-dots').classList.add('hidden');
            document.getElementById('auto-next-bar').style.width = '0%';
            if (isMusicOn) bgMusic.play();
        }

        function setupGame(mode) {
            currentMode = mode; step = 0; bgMusic.pause();
            speak(' ');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('stage').classList.remove('hidden');
            document.getElementById('stage-footer').classList.remove('hidden');
            document.getElementById('progress-dots').classList.remove('hidden');
            
            const data = unitData[currentUnit];
            
            if (mode === 'memory') {
                sessionData = Array(5).fill(0).map(() => {
                    const pool = [...data.vocab].sort(() => Math.random() - 0.5).slice(0, 3);
                    return pool;
                });
            } else if (mode === 'sentence') {
                let pool = [...data.sentences].sort(() => Math.random() - 0.5);
                while(pool.length < 5) pool = pool.concat(data.sentences);
                sessionData = pool.slice(0, 5); 
            } else if (mode === 'radical') { 
                sessionData = [...data.radical]; 
            } else { 
                sessionData = [...data.vocab].sort(() => Math.random() - 0.5).slice(0, 5); 
            }
            renderStep();
        }

        function renderStep() {
            isProcessing = false;
            isTransitioning = false;
            const bar = document.getElementById('auto-next-bar');
            bar.style.transition = 'none';
            bar.style.width = '0%';
            const content = document.getElementById('stage-content');
            content.innerHTML = '';
            updateDots();
            const current = sessionData[step];

            if (currentMode === 'memory') renderMemoryFlip(current);
            else if (currentMode === 'circle') renderCircle(current);
            else if (currentMode === 'listening') renderListening(current);
            else if (currentMode === 'sentence') renderSentence(current);
            else if (currentMode === 'radical') renderRadical(current);
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            const total = sessionData.length;
            dots.forEach((dot, i) => {
                dot.classList.remove('dot-active', 'dot-done', 'hidden');
                if (i >= total) dot.classList.add('hidden');
                else if (i < step) dot.classList.add('dot-done');
                else if (i === step) dot.classList.add('dot-active');
            });
        }

        function triggerSuccessFeedback() {
            if (isTransitioning) return;
            isTransitioning = true;
            successAudio.currentTime = 0; successAudio.play().catch(()=>{});
            const bar = document.getElementById('auto-next-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(()=>{ bar.style.transition = 'width 0.6s linear'; bar.style.width = '100%'; }, 10);
            setTimeout(() => { 
                step++; isTransitioning = false;
                if (step >= sessionData.length) showVictory(); else renderStep(); 
            }, 700);
        }

        function playError() { failAudio.currentTime = 0; failAudio.play().catch(()=>{}); }

        function renderMemoryFlip(chosenPool) {
            flippedCards = []; matchedCount = 0;
            const cards = [];
            chosenPool.forEach(v => {
                cards.push({ type: 'icon', value: v.icon, matchId: v.word });
                cards.push({ type: 'word', value: v.word, matchId: v.word });
            });
            cards.sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 p-1 w-full max-w-[280px]">
                    ${cards.map((c) => `
                        <div class="memory-card" data-match="${c.matchId}" onclick="handleCardClick(this)">
                            <div class="memory-card-inner"><div class="card-front">?</div><div class="card-back">${c.value}</div></div>
                        </div>
                    `).join('')}
                </div>
                <p class="text-orange-500 font-bold text-center mt-3 animate-bounce text-lg">第 ${step+1} 关：配配对！</p>
            `;
        }

        function handleCardClick(cardEl) {
            if (isProcessing || isTransitioning || cardEl.classList.contains('is-flipped')) return;
            cardEl.classList.add('is-flipped');
            const matchId = cardEl.dataset.match;
            speak(matchId);
            flippedCards.push(cardEl);
            if (flippedCards.length === 2) {
                isProcessing = true;
                const [c1, c2] = flippedCards;
                if (c1.dataset.match === c2.dataset.match) {
                    setTimeout(() => { matchedCount++; flippedCards = []; isProcessing = false; if (matchedCount === 3) triggerSuccessFeedback(); }, 400);
                } else {
                    setTimeout(() => { playError(); c1.classList.remove('is-flipped'); c2.classList.remove('is-flipped'); flippedCards = []; isProcessing = false; }, 800);
                }
            }
        }

        function renderSentence(data) {
            window.currentTempSentence = Array(data.parts.length).fill(null);
            const shuffled = [...data.parts].sort(() => Math.random() - 0.5);
            let caterpillarHtml = `
                <div class="flex flex-row items-center flex-wrap justify-center w-full px-2 gap-y-2">
                    <div class="caterpillar-head-container wiggle">
                        <div class="antenna antenna-l"></div><div class="antenna antenna-r"></div>
                        <div class="caterpillar-face">
                            <div class="eye-container"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                            <div class="smile"></div>
                        </div>
                    </div>
                    ${data.parts.map((_, i) => `<div class="caterpillar-slot wiggle" id="slot-${i}" onclick="undoSentencePart(${i})" style="animation-delay: ${i * 0.15}s">${i + 1}</div>`).join('')}
                </div>
            `;
            document.getElementById('stage-content').innerHTML = `
                <div class="w-full flex flex-col items-center space-y-6">
                    <div class="w-full bg-blue-50/40 rounded-[2.5rem] py-8 px-2 border-2 border-dashed border-blue-100 flex justify-center items-center min-h-[160px]">${caterpillarHtml}</div>
                    <div class="flex flex-wrap gap-2.5 justify-center w-full px-2 max-h-[30vh] overflow-y-auto no-scrollbar">
                        ${shuffled.map((word, idx) => `<button id="sentence-btn-${idx}" onclick="handleSentenceClick(${idx}, '${word}', '${data.parts.join('')}')" class="px-4 py-3 ${data.colors[data.parts.indexOf(word)] || 'bg-blue-400'} text-white font-bold rounded-2xl text-lg shadow-md active:scale-90 transition">${word}</button>`).join('')}
                    </div>
                    <p class="text-[11px] text-blue-300 font-bold">点击毛毛虫身上的字可以拿回来哦！</p>
                </div>
            `;
        }

        function handleSentenceClick(btnIdx, word, full) {
            if (isProcessing || isTransitioning) return;
            speak(word);
            const emptyIdx = window.currentTempSentence.findIndex(s => s === null);
            if (emptyIdx === -1) return;
            const slot = document.getElementById(`slot-${emptyIdx}`);
            const btn = document.getElementById(`sentence-btn-${btnIdx}`);
            const colorClass = Array.from(btn.classList).find(c => c.startsWith('bg-'));
            slot.innerText = word; slot.classList.add('filled', colorClass); slot.dataset.btnRef = btnIdx; 
            btn.classList.add('invisible', 'pointer-events-none');
            window.currentTempSentence[emptyIdx] = word;
            if (window.currentTempSentence.filter(x => x !== null).join('') === full) {
                isProcessing = true;
                setTimeout(() => { speak(full, () => triggerSuccessFeedback()); }, 800);
            }
        }

        window.undoSentencePart = function(slotIdx) {
            if (isProcessing || isTransitioning) return;
            const slot = document.getElementById(`slot-${slotIdx}`);
            if (!slot.classList.contains('filled')) return;
            const btnIdx = slot.dataset.btnRef;
            const btn = document.getElementById(`sentence-btn-${btnIdx}`);
            speak("拿回来");
            btn.classList.remove('invisible', 'pointer-events-none');
            slot.innerText = slotIdx + 1;
            const colorClass = Array.from(slot.classList).find(c => c.startsWith('bg-'));
            slot.classList.remove('filled', colorClass);
            window.currentTempSentence[slotIdx] = null;
        };

        function renderCircle(target) {
            const pool = unitData[currentUnit].vocab;
            const options = [target, pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5)[0]].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full space-y-6">
                    <div class="text-[4rem] p-6 bg-yellow-50 rounded-[2rem] border-4 border-dashed border-yellow-100 flex items-center justify-center min-h-[100px] shadow-inner">${target.icon}</div>
                    <div class="grid grid-cols-1 gap-4 w-full px-4">
                        ${options.map(opt => `<button onclick="checkCircle(this, '${opt.word}', '${target.word}')" class="relative py-6 text-2xl font-bold bg-white border-2 border-gray-100 rounded-[2rem] active:scale-95 transition shadow-md">
                                ${opt.word}<div class="circle-box hidden absolute inset-0"><svg class="circle-svg" viewBox="0 0 100 50"><ellipse cx="50" cy="25" rx="46" ry="22" class="circle-path" /></svg></div>
                            </button>`).join('')}
                    </div>
                </div>
            `;
        }

        function checkCircle(btn, selected, correct) {
            if (isProcessing || isTransitioning) return;
            speak(selected);
            if (selected === correct) { isProcessing = true; btn.querySelector('.circle-box').classList.remove('hidden'); triggerSuccessFeedback(); }
            else { playError(); btn.classList.add('border-red-300', 'text-red-400'); }
        }

        function renderListening(target) {
            const pool = unitData[currentUnit].vocab;
            const options = [target, ...pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2)].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full space-y-8">
                    <button id="speaker-btn" onclick="speak('${target.word}')" class="w-36 h-36 bg-blue-500 text-white rounded-full text-8xl shadow-xl active:scale-90 flex items-center justify-center border-4 border-white animate-pulse">🔊</button>
                    <div class="grid grid-cols-1 gap-4 w-full px-4">
                        ${options.map(opt => `<button onclick="checkListening(this, '${opt.word}', '${target.word}')" class="py-6 text-2xl font-bold bg-white border-4 border-blue-50 rounded-[2rem] shadow-md">${opt.word}</button>`).join('')}
                    </div>
                </div>
            `;
            setTimeout(() => speak(target.word), 300);
        }

        function checkListening(btn, selected, correct) {
            if (isProcessing || isTransitioning) return;
            if (selected === correct) { isProcessing = true; btn.classList.add('bg-green-500', 'text-white'); triggerSuccessFeedback(); }
            else { playError(); btn.classList.add('border-red-200', 'text-red-300'); }
        }

        function renderRadical(rData) {
            radicalFound = 0;
            const pool = rData.match.map(c => ({char: c, isMatch: true})).concat(rData.fail.map(c => ({char: c, isMatch: false}))).sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center w-full space-y-8">
                    <p class="text-xl font-bold">找出带 <span class="text-5xl font-black text-red-500 mx-1">“${rData.char}”</span> 的字：</p>
                    <div class="grid grid-cols-3 gap-4 justify-items-center px-4">
                        ${pool.map(r => `<button onclick="handleRadicalClick(this, ${r.isMatch})" class="w-20 h-20 text-3xl font-bold bg-white border-2 border-pink-100 rounded-full flex items-center justify-center shadow-md active:scale-95 transition">${r.char}</button>`).join('')}
                    </div>
                    <div id="radical-status" class="text-xl text-pink-500 font-bold py-3 px-10 bg-pink-50 rounded-full inline-block">已找到：0 / 6</div>
                </div>
            `;
        }

        function handleRadicalClick(btn, isMatch) {
            if (btn.disabled || isProcessing || isTransitioning) return;
            if (isMatch) { btn.disabled = true; btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700'); radicalFound++; document.getElementById('radical-status').innerText = `已找到：${radicalFound} / 6`; speak(btn.innerText); if (radicalFound >= 6) { isProcessing = true; triggerSuccessFeedback(); } }
            else { playError(); btn.classList.add('opacity-40', 'bg-gray-100'); }
        }

        function showVictory() {
            speak("你真棒！挑战成功！");
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center p-4"><div class="text-[8rem] animate-bounce mb-6">🏆</div><h2 class="text-3xl font-bold text-orange-500 mb-10">挑战成功！</h2><button onclick="backToMenu()" class="px-14 py-4 bg-yellow-400 text-blue-900 text-2xl font-bold rounded-[2rem] shadow-lg active:scale-95 transition">返回主页</button></div>
            `;
            document.getElementById('progress-dots').classList.add('hidden');
        }
    </script>
</body>
</html>
