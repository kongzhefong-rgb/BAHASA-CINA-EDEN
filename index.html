<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幼儿园 - 互动学习乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff9ed;
            overflow-x: hidden;
            touch-action: none; /* 禁用系统手势，优化连线体验 */
            user-select: none;
        }

        /* 选中态和动画 */
        .matching-item {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 10;
            background-color: white;
        }
        .item-selected {
            border-color: #3b82f6 !important;
            background-color: #eff6ff !important;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .item-connected {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            cursor: default;
        }

        /* 红色手绘圈圈 */
        .circle-svg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 140%;
            pointer-events: none;
            z-index: 20;
        }
        .circle-path {
            fill: none;
            stroke: #ff4757;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawCircle 0.8s ease-out forwards;
        }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .progress-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background-color: #e2e8f0;
            transition: all 0.3s ease;
        }
        .dot-active { background-color: #fbbf24; transform: scale(1.3); }
        .dot-done { background-color: #10b981; }

        .word-tag {
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
        }
    </style>
</head>
<body class="p-2 md:p-6">

    <div id="app" class="max-w-4xl mx-auto bg-white rounded-[2.5rem] shadow-2xl overflow-hidden min-h-[90vh] flex flex-col relative border-8 border-yellow-100">
        
        <header id="top-bar" class="bg-gradient-to-b from-yellow-50 to-white p-4 text-center">
            <h1 class="text-2xl font-bold text-blue-900 mb-2">🎈 华语互动乐园</h1>
            <div id="progress-dots" class="hidden flex justify-center gap-3">
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
                <div class="progress-dot"></div>
            </div>
        </header>

        <div id="start-page" class="flex-grow flex flex-col items-center justify-center p-10 space-y-6">
            <div class="text-[10rem] mb-4">🏫</div>
            <h2 class="text-3xl font-bold text-blue-800">开始快乐学习吧！</h2>
            <button onclick="enterMenu()" class="px-12 py-5 bg-orange-400 text-white text-2xl font-bold rounded-full shadow-lg hover:bg-orange-500 active:scale-95 transition">点击开始</button>
        </div>

        <nav id="main-menu" class="hidden p-6 grid grid-cols-2 md:grid-cols-3 gap-6 flex-grow content-center">
            <button onclick="setupGame('matching')" class="p-6 bg-orange-50 border-b-8 border-orange-200 rounded-3xl text-center hover:scale-105 transition">
                <div class="text-5xl mb-3">🔗</div>
                <div class="font-bold text-orange-800 text-xl">连一连</div>
            </button>
            <button onclick="setupGame('circle')" class="p-6 bg-green-50 border-b-8 border-green-200 rounded-3xl text-center hover:scale-105 transition">
                <div class="text-5xl mb-3">⭕</div>
                <div class="font-bold text-green-800 text-xl">看图圈词</div>
            </button>
            <button onclick="setupGame('listening')" class="p-6 bg-blue-50 border-b-8 border-blue-200 rounded-3xl text-center hover:scale-105 transition">
                <div class="text-5xl mb-3">👂</div>
                <div class="font-bold text-blue-800 text-xl">听音辨字</div>
            </button>
            <button onclick="setupGame('sentence')" class="p-6 bg-purple-50 border-b-8 border-purple-200 rounded-3xl text-center hover:scale-105 transition">
                <div class="text-5xl mb-3">✍️</div>
                <div class="font-bold text-purple-800 text-xl">排句子</div>
            </button>
            <button onclick="setupGame('radical')" class="p-6 bg-pink-50 border-b-8 border-pink-200 rounded-3xl text-center hover:scale-105 transition">
                <div class="text-5xl mb-3">🏛️</div>
                <div class="font-bold text-pink-800 text-xl">部首寻宝</div>
            </button>
            <div class="flex items-center justify-center">
                <button onclick="toggleMusic()" id="music-btn" class="text-4xl p-5 bg-gray-50 rounded-full shadow-inner border-2 border-gray-100">🔇</button>
            </div>
        </nav>

        <div id="stage" class="hidden flex-grow flex flex-col p-4 relative overflow-hidden" 
             onmousemove="handleGlobalMove(event)" 
             ontouchmove="handleGlobalMove(event)">
            <canvas id="line-canvas"></canvas>
            <div id="stage-content" class="flex-grow flex flex-col items-center justify-center min-h-[400px]"></div>
            <div class="p-4 text-center">
                <button onclick="backToMenu()" class="text-gray-400 font-bold hover:text-gray-600 transition">回到主页</button>
            </div>
        </div>

        <div id="modal" class="fixed inset-0 flex items-center justify-center bg-black/50 z-[100] hidden">
            <div class="bg-white p-10 rounded-[3rem] text-center shadow-2xl border-8 border-yellow-400 max-w-sm mx-4 transform">
                <div id="modal-icon" class="text-8xl mb-4"></div>
                <div id="modal-text" class="text-2xl font-bold mb-8 text-blue-900"></div>
                <button onclick="handleModalNext()" class="w-full py-4 bg-blue-500 text-white text-xl font-bold rounded-2xl shadow-lg active:scale-95">下一题</button>
            </div>
        </div>
    </div>

    <script>
        const vocab = [
            { word: '幼儿园', icon: '🏫' },
            { word: '老师', icon: '👩‍🏫' },
            { word: '同学', icon: '🎒' }, 
            { word: '课室', icon: '📝' },
            { word: '学习角落', icon: '📚' },
            { word: '电脑室', icon: '💻' },
            { word: '办公室', icon: '📠' },
            { word: '厕所', icon: '🚻' },
            { word: '游乐场', icon: '🎠' },
            { word: '礼堂', icon: '🏛️' },
            { word: '园长', icon: '👩‍💼' },
            { word: '校车司机', icon: '👨‍✈️' },
            { word: '园工', icon: '🧹' }
        ];

        const sentences = [
            { parts: ['这是', '我的', '幼儿园。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
            { parts: ['幼儿园里', '有', '课室。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
            { parts: ['课室里', '有', '学习角落。'], colors: ['bg-purple-400', 'bg-yellow-500', 'bg-teal-400'] },
            { parts: ['幼儿园里', '有', '电脑室', '和', '办公室。'], colors: ['bg-blue-400', 'bg-red-400', 'bg-green-400', 'bg-yellow-400', 'bg-pink-400'] },
            { parts: ['游乐场', '旁边', '有', '厕所。'], colors: ['bg-orange-400', 'bg-teal-400', 'bg-blue-400', 'bg-red-400'] },
            { parts: ['幼儿园里', '有', '礼堂。'], colors: ['bg-indigo-400', 'bg-pink-400', 'bg-yellow-400'] },
            { parts: ['礼堂里', '有', '园长，', '老师和同学。'], colors: ['bg-blue-400', 'bg-green-400', 'bg-red-400', 'bg-purple-400'] },
            { parts: ['办公室里', '有', '园长', '和', '老师。'], colors: ['bg-teal-400', 'bg-orange-400', 'bg-pink-400', 'bg-blue-400', 'bg-green-400'] },
            { parts: ['课室里', '有', '同学。'], colors: ['bg-pink-400', 'bg-yellow-400', 'bg-indigo-400'] },
            { parts: ['幼儿园里', '有', '校车。'], colors: ['bg-blue-400', 'bg-orange-400', 'bg-red-400'] },
            { parts: ['校车司机', '接送', '我们', '上下学。'], colors: ['bg-indigo-400', 'bg-purple-400', 'bg-teal-400', 'bg-pink-400'] },
            { parts: ['幼儿园里', '有', '园工。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-orange-400'] }
        ];

        const radicalList = [
            { char: '室', isMatch: true }, { char: '家', isMatch: true }, { char: '官', isMatch: true },
            { char: '客', isMatch: true }, { char: '安', isMatch: true }, { char: '守', isMatch: true },
            { char: '园', isMatch: false }, { char: '师', isMatch: false }, { char: '学', isMatch: false },
            { char: '校', isMatch: false }, { char: '工', isMatch: false }, { char: '公', isMatch: false }
        ];

        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'); 
        bgMusic.loop = true;
        bgMusic.volume = 0.1;
        let isMusicOn = false;

        let currentMode = '';
        let step = 0;
        let sessionData = [];
        let connections = [];
        let matchingSelection = null;
        let mousePos = { x: 0, y: 0 };
        let radicalFound = 0;

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 0.5;
            if (callback) { utter.onend = callback; }
            window.speechSynthesis.speak(utter);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            isMusicOn = !isMusicOn;
            if (isMusicOn) { bgMusic.play(); btn.innerText = '🔊'; }
            else { bgMusic.pause(); btn.innerText = '🔇'; }
        }

        function enterMenu() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('progress-dots').classList.add('hidden');
            if (isMusicOn) bgMusic.play();
        }

        function handleGlobalMove(e) {
            if (currentMode !== 'matching' || !matchingSelection) return;
            const app = document.getElementById('app');
            const rect = app.getBoundingClientRect();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            mousePos.x = clientX - rect.left;
            mousePos.y = clientY - rect.top;
            drawConnections();
        }

        function setupGame(mode) {
            currentMode = mode;
            step = 0;
            bgMusic.pause();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('stage').classList.remove('hidden');
            document.getElementById('progress-dots').classList.remove('hidden');
            
            if (mode === 'sentence') {
                sessionData = [...sentences].sort(() => Math.random() - 0.5).slice(0, 5);
            } else if (mode === 'radical' || mode === 'matching') {
                sessionData = [1];
            } else {
                sessionData = [...vocab].sort(() => Math.random() - 0.5).slice(0, 5);
            }
            renderStep();
        }

        function renderStep() {
            const content = document.getElementById('stage-content');
            content.innerHTML = '';
            clearCanvas();
            updateDots();
            const current = sessionData[step];

            if (currentMode === 'matching') renderMatching();
            else if (currentMode === 'circle') renderCircle(current);
            else if (currentMode === 'listening') renderListening(current);
            else if (currentMode === 'sentence') renderSentence(current);
            else if (currentMode === 'radical') renderRadical();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            const total = currentMode === 'matching' || currentMode === 'radical' ? 1 : 5;
            dots.forEach((dot, i) => {
                dot.classList.remove('dot-active', 'dot-done', 'hidden');
                if (i >= total) dot.classList.add('hidden');
                else if (i < step) dot.classList.add('dot-done');
                else if (i === step) dot.classList.add('dot-active');
            });
        }

        // --- 连一连修复核心 ---
        function renderMatching() {
            const items = [...vocab].sort(() => Math.random() - 0.5).slice(0, 5);
            const shuffledWords = [...items].sort(() => Math.random() - 0.5);
            
            const content = document.getElementById('stage-content');
            content.innerHTML = `
                <div class="w-full flex justify-between items-center px-10 h-[450px] relative z-20">
                    <div class="flex flex-col justify-between h-full py-10 space-y-4">
                        ${items.map((it, i) => `
                            <div id="m-icon-${i}" data-id="${it.word}" class="matching-item w-24 h-24 border-4 border-yellow-200 rounded-2xl flex items-center justify-center text-5xl shadow-sm cursor-pointer hover:scale-105">
                                ${it.icon}
                            </div>
                        `).join('')}
                    </div>
                    <div class="flex flex-col justify-between h-full py-10 space-y-4">
                        ${shuffledWords.map((it, i) => `
                            <div id="m-word-${i}" data-id="${it.word}" class="matching-item px-8 py-4 border-4 border-blue-200 rounded-2xl flex items-center justify-center text-2xl font-bold shadow-sm cursor-pointer hover:scale-105">
                                ${it.word}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            setTimeout(initMatchingLines, 100);
        }

        function initMatchingLines() {
            const app = document.getElementById('app');
            const canvas = document.getElementById('line-canvas');
            canvas.width = app.offsetWidth;
            canvas.height = app.offsetHeight;

            document.querySelectorAll('.matching-item').forEach(el => {
                el.onclick = function(e) {
                    if (this.classList.contains('item-connected')) return;
                    
                    const isIcon = this.id.includes('icon');
                    if (!isIcon) speak(this.innerText);
                    
                    const appRect = app.getBoundingClientRect();
                    const rect = this.getBoundingClientRect();
                    
                    // 获取精确中心点坐标
                    const point = {
                        x: rect.left - appRect.left + rect.width / 2,
                        y: rect.top - appRect.top + rect.height / 2,
                        id: this.dataset.id,
                        el: this,
                        type: isIcon ? 'icon' : 'word'
                    };

                    if (!matchingSelection) {
                        matchingSelection = point;
                        this.classList.add('item-selected');
                        mousePos = { x: point.x, y: point.y };
                    } else {
                        if (matchingSelection.id === point.id && matchingSelection.type !== point.type) {
                            connections.push({p1: matchingSelection, p2: point});
                            this.classList.add('item-connected');
                            matchingSelection.el.classList.add('item-connected');
                            matchingSelection.el.classList.remove('item-selected');
                            matchingSelection = null;
                            drawConnections();
                            if (connections.length === 5) setTimeout(() => showFeedback(true, "连线成功！太棒了！"), 600);
                        } else {
                            matchingSelection.el.classList.remove('item-selected');
                            if (matchingSelection.id !== point.id) speak("再试一试吧");
                            matchingSelection = null;
                            drawConnections();
                        }
                    }
                };
            });
        }

        function drawConnections() {
            const canvas = document.getElementById('line-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            
            connections.forEach(c => {
                ctx.beginPath();
                ctx.strokeStyle = '#10b981';
                ctx.moveTo(c.p1.x, c.p1.y);
                ctx.lineTo(c.p2.x, c.p2.y);
                ctx.stroke();
            });

            if (matchingSelection) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.6)';
                ctx.setLineDash([10, 5]);
                ctx.moveTo(matchingSelection.x, matchingSelection.y);
                ctx.lineTo(mousePos.x, mousePos.y);
                ctx.stroke();
                ctx.setLineDash([]);
            }
        }

        function clearCanvas() {
            connections = [];
            matchingSelection = null;
            const canvas = document.getElementById('line-canvas');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        function renderCircle(target) {
            const distractors = vocab.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = [target.word, distractors[0].word, distractors[1].word].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center">
                    <div class="text-[12rem] mb-12 p-10 bg-yellow-50 rounded-full border-4 border-dashed border-yellow-200">${target.icon}</div>
                    <div class="grid grid-cols-1 gap-6 w-full px-12">
                        ${options.map(opt => `
                            <button onclick="checkCircle(this, '${opt}', '${target.word}')" class="relative py-5 text-3xl font-bold bg-white border-4 border-gray-100 rounded-3xl active:scale-95 transition">
                                ${opt}
                                <div class="circle-box hidden absolute inset-0">
                                    <svg class="circle-svg" viewBox="0 0 100 50">
                                        <ellipse cx="50" cy="25" rx="46" ry="22" class="circle-path" />
                                    </svg>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkCircle(btn, selected, correct) {
            speak(selected);
            if (selected === correct) {
                btn.querySelector('.circle-box').classList.remove('hidden');
                setTimeout(() => showFeedback(true, "答对了！"), 1000);
            } else {
                btn.classList.add('border-red-400', 'text-red-500');
                speak("再试一试吧");
            }
        }

        function renderListening(target) {
            const distractors = vocab.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = [target.word, distractors[0].word, distractors[1].word].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full">
                    <button onclick="speak('${target.word}')" class="w-48 h-48 bg-blue-500 text-white rounded-full text-8xl mb-12 shadow-xl active:scale-90 animate-pulse">🔊</button>
                    <div class="grid grid-cols-1 gap-6 w-full px-12">
                        ${options.map(opt => `<button onclick="checkListening(this, '${opt}', '${target.word}')" class="py-6 text-3xl font-bold bg-white border-4 border-blue-50 rounded-3xl shadow-sm">${opt}</button>`).join('')}
                    </div>
                </div>
            `;
            speak(target.word);
        }

        function checkListening(btn, selected, correct) {
            if (selected === correct) {
                btn.classList.add('bg-green-500', 'text-white', 'border-green-600');
                showFeedback(true, "听力真好！");
            } else {
                btn.classList.add('border-red-300', 'text-red-400');
                speak("再试一试吧");
            }
        }

        function renderSentence(data) {
            let userSentence = [];
            const shuffled = [...data.parts].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="w-full px-6 text-center">
                    <div id="sentence-box" class="min-h-[140px] bg-gray-50 rounded-[2.5rem] p-8 mb-10 flex flex-wrap gap-4 justify-center items-center border-4 border-dashed border-gray-200"></div>
                    <div class="flex flex-wrap gap-4 justify-center" id="pool">
                        ${shuffled.map((word, i) => {
                            const originIdx = data.parts.indexOf(word);
                            const color = data.colors[originIdx] || 'bg-gray-400';
                            return `<button onclick="handleSentenceClick(this, '${word}', '${data.parts.join('')}')" class="word-tag px-8 py-4 ${color} text-white font-bold rounded-2xl text-2xl active:scale-90 transition transform hover:scale-105">${word}</button>`;
                        }).join('')}
                    </div>
                </div>
            `;
            window.tempSentence = [];
        }

        function handleSentenceClick(btn, word, full) {
            speak(word);
            const box = document.getElementById('sentence-box');
            const tag = document.createElement('span');
            tag.className = btn.className + " !scale-100 !transform-none cursor-default";
            tag.innerText = word;
            box.appendChild(tag);
            btn.classList.add('invisible', 'pointer-events-none');
            window.tempSentence.push(word);
            
            if (window.tempSentence.join('') === full) {
                // 排对后逻辑：先读一遍，读完再出鼓励
                setTimeout(() => {
                    speak(full, () => {
                        showFeedback(true, "句子排得非常棒！");
                    });
                }, 600);
            }
        }

        function renderRadical() {
            radicalFound = 0;
            const pool = [...radicalList].sort(() => Math.random() - 0.5);
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center px-6">
                    <p class="text-2xl mb-8">请圈出所有带 <span class="text-5xl font-bold text-red-500 mx-3">“宀”</span> 的字：</p>
                    <div class="grid grid-cols-3 gap-6">
                        ${pool.map(r => `<button onclick="handleRadicalClick(this, ${r.isMatch})" class="w-24 h-24 text-4xl font-bold bg-white border-4 border-pink-100 rounded-full flex items-center justify-center shadow-sm active:scale-95 transition">${r.char}</button>`).join('')}
                    </div>
                    <div id="radical-status" class="mt-12 text-2xl text-pink-500 font-bold py-4 px-10 bg-pink-50 rounded-full inline-block">已找到：0 / 6</div>
                </div>
            `;
        }

        function handleRadicalClick(btn, isMatch) {
            if (btn.disabled) return;
            if (isMatch) {
                btn.disabled = true;
                btn.classList.replace('border-pink-100', 'border-green-500');
                btn.classList.add('bg-green-100', 'scale-110');
                radicalFound++;
                document.getElementById('radical-status').innerText = `已找到：${radicalFound} / 6`;
                speak(btn.innerText);
                if (radicalFound >= 6) setTimeout(() => showFeedback(true, "部首大获全胜！"), 800);
            } else {
                btn.classList.add('bg-gray-100', 'border-gray-300', 'text-gray-300');
                speak("再试一试吧");
            }
        }

        function showFeedback(success, text) {
            const modal = document.getElementById('modal');
            document.getElementById('modal-icon').innerText = success ? '🌟' : '💡';
            document.getElementById('modal-text').innerText = text;
            modal.classList.remove('hidden');
            if (success) {
                new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3').play();
            }
        }

        function handleModalNext() {
            document.getElementById('modal').classList.add('hidden');
            step++;
            const total = currentMode === 'matching' || currentMode === 'radical' ? 1 : 5;
            if (step >= total) showVictory();
            else renderStep();
        }

        function showVictory() {
            speak("恭喜你！完成练习啦！");
            document.getElementById('stage-content').innerHTML = `<div class="text-center"><div class="text-[12rem] animate-bounce mb-8">🏆</div><h2 class="text-4xl font-bold text-orange-500 mb-10">你真棒！</h2><button onclick="backToMenu()" class="px-16 py-5 bg-yellow-400 text-blue-900 text-3xl font-bold rounded-[2rem] shadow-xl">回到主页</button></div>`;
            document.getElementById('progress-dots').classList.add('hidden');
        }

        window.onresize = () => { if (currentMode === 'matching') {
            const app = document.getElementById('app');
            const canvas = document.getElementById('line-canvas');
            canvas.width = app.offsetWidth;
            canvas.height = app.offsetHeight;
            drawConnections(); 
        }};
    </script>
</body>
</html>
