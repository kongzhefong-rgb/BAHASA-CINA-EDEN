<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幼儿园 - 互动学习乐园</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #fff9ed;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100dvh;
            margin: 0;
        }

        /* 3D 翻牌动画 - 2x3 极大化显示 */
        .memory-card {
            perspective: 1000px;
            width: 100%;
            aspect-ratio: 1/1.2;
            cursor: pointer;
        }
        .memory-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .memory-card.is-flipped .memory-card-inner {
            transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #fde68a;
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }
        .card-front {
            background-color: #fbbf24;
            color: white;
            font-size: 3.5rem;
            font-weight: bold;
        }
        .card-back {
            background-color: white;
            transform: rotateY(180deg);
            font-size: 3.5rem;
            font-weight: bold;
            color: #1e3a8a;
            text-align: center;
            padding: 4px;
        }

        /* 毛毛虫头像 */
        .caterpillar-head-container {
            width: 65px;
            height: 75px;
            position: relative;
            z-index: 30;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .caterpillar-face {
            width: 60px;
            height: 60px;
            background-color: #fb923c; 
            border: 3px solid #ea580c;
            border-radius: 50%;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .antenna {
            position: absolute;
            top: -10px;
            width: 3.5px;
            height: 16px;
            background-color: #4b5563;
        }
        .antenna::after {
            content: '';
            position: absolute; top: -5px; left: -3.25px; width: 10px; height: 10px;
            background-color: #4b5563; border-radius: 50%;
        }
        .antenna-l { left: 18px; transform: rotate(-25deg); }
        .antenna-r { right: 18px; transform: rotate(25deg); }
        
        .eye-container { display: flex; gap: 7px; margin-top: -3px; }
        .eye { width: 11px; height: 15px; background: white; border: 1.5px solid #374151; border-radius: 50%; position: relative; }
        .pupil { position: absolute; width: 5px; height: 5px; background: black; border-radius: 50%; bottom: 2px; left: 50%; transform: translateX(-50%); }
        .smile { width: 24px; height: 11px; border-bottom: 3px solid #374151; border-radius: 0 0 12px 12px; margin-top: 1px; }

        /* S型毛毛虫身体 - 2列 S 型排版 */
        .caterpillar-slot {
            width: 58px; 
            height: 58px; 
            border-radius: 50%; 
            border: 2.5px solid #e2e8f0; 
            background-color: #ffffff;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold;
            color: #cbd5e1; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
            z-index: 10; 
            font-size: 0.95rem; 
            text-align: center; 
            margin: 2px -4px; /* 身体重叠，更紧凑 */
            cursor: pointer;
        }
        .caterpillar-slot.filled { border: 4px solid rgba(0,0,0,0.05); color: white; z-index: 15; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        
        .wiggle { animation: wiggle 2s infinite ease-in-out; }
        @keyframes wiggle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

        .progress-dot { width: 9px; height: 9px; border-radius: 50%; background-color: #e2e8f0; transition: all 0.3s ease; }
        .dot-active { background-color: #fbbf24; transform: scale(1.5); }
        .dot-done { background-color: #10b981; }

        .circle-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 135%; height: 135%; pointer-events: none; z-index: 20; }
        .circle-path { fill: none; stroke: #ff4757; stroke-width: 9; stroke-linecap: round; stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: drawCircle 0.8s ease-out forwards; }
        @keyframes drawCircle { to { stroke-dashoffset: 0; } }

        .loading-bar { position: fixed; top: 0; left: 0; height: 5px; background: #10b981; width: 0%; z-index: 200; transition: width 1.5s linear; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        #app {
            height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        main {
            flex: 1;
            overflow-y: auto;
            position: relative;
        }
    </style>
</head>
<body>

    <div id="auto-next-bar" class="loading-bar"></div>

    <div id="app" class="w-full max-w-md bg-white shadow-2xl overflow-hidden relative border-x-4 border-yellow-100 mx-auto">
        
        <!-- 顶部固定区 -->
        <header id="top-bar" class="bg-gradient-to-b from-yellow-50 to-white pt-5 pb-3 px-4 text-center flex-shrink-0 z-50">
            <h1 class="text-xl font-bold text-blue-900 mb-2">🍭 华语学习乐园</h1>
            <div id="progress-dots" class="hidden flex justify-center gap-2">
                <div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div><div class="progress-dot"></div>
            </div>
        </header>

        <!-- 中间内容区 -->
        <main class="no-scrollbar flex flex-col">
            
            <!-- 单元选择 -->
            <div id="unit-page" class="hidden flex-grow flex flex-col items-center justify-center p-6 space-y-5">
                <h2 class="text-2xl font-bold text-orange-600">请选择单元</h2>
                <div class="grid grid-cols-1 gap-4 w-full">
                    <button onclick="selectUnit(1)" class="p-5 bg-yellow-50 border-2 border-yellow-200 rounded-[2rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-4xl mb-1">🏫</div>
                        <div class="font-bold text-yellow-800 text-lg">第一单元</div>
                        <div class="text-xs text-yellow-600">开学探险日 (我的幼儿园)</div>
                    </button>
                    <button onclick="selectUnit(2)" class="p-5 bg-green-50 border-2 border-green-200 rounded-[2rem] text-left active:scale-95 transition shadow-sm">
                        <div class="text-4xl mb-1">👫</div>
                        <div class="font-bold text-green-800 text-lg">第二单元</div>
                        <div class="text-xs text-green-600">一起玩，真开心 (学习分享)</div>
                    </button>
                </div>
            </div>

            <!-- 开始屏幕 -->
            <div id="start-page" class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
                <div class="text-[8rem] animate-bounce">🎒</div>
                <h2 class="text-3xl font-bold text-blue-800">准备好了吗？</h2>
                <button onclick="enterUnitSelection()" class="px-12 py-5 bg-orange-400 text-white text-2xl font-bold rounded-full shadow-lg active:scale-95 transition">点击开始</button>
            </div>

            <!-- 游戏主菜单 -->
            <nav id="main-menu" class="hidden p-4 grid grid-cols-2 gap-4 flex-grow content-center">
                <div id="unit-info" class="col-span-2 text-center mb-2 font-bold text-orange-500 text-lg">当前练习：第一单元</div>
                <button onclick="setupGame('memory')" class="p-5 bg-orange-50 border-b-4 border-orange-200 rounded-[1.5rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-5xl mb-1">🎴</div>
                    <div class="font-bold text-orange-800">翻一翻</div>
                </button>
                <button onclick="setupGame('circle')" class="p-5 bg-green-50 border-b-4 border-green-200 rounded-[1.5rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-5xl mb-1">⭕</div>
                    <div class="font-bold text-green-800">看图圈词</div>
                </button>
                <button onclick="setupGame('listening')" class="p-5 bg-blue-50 border-b-4 border-blue-200 rounded-[1.5rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-5xl mb-1">👂</div>
                    <div class="font-bold text-blue-800">听音辨字</div>
                </button>
                <button onclick="setupGame('sentence')" class="p-5 bg-purple-50 border-b-4 border-purple-200 rounded-[1.5rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-5xl mb-1">🐛</div>
                    <div class="font-bold text-purple-800">排句子</div>
                </button>
                <button onclick="setupGame('radical')" class="p-5 bg-pink-50 border-b-4 border-pink-200 rounded-[1.5rem] text-center active:scale-95 transition shadow-sm">
                    <div class="text-5xl mb-1">🏛️</div>
                    <div class="font-bold text-pink-800">部首寻宝</div>
                </button>
                <div class="flex items-center justify-center flex-col gap-2">
                    <button onclick="toggleMusic()" id="music-btn" class="text-xl p-4 bg-gray-50 rounded-full border-2 border-gray-100 shadow-inner">🔇</button>
                    <button onclick="enterUnitSelection()" class="text-xs font-bold text-blue-500 underline">更换单元</button>
                </div>
            </nav>

            <!-- 练习内容区域 -->
            <div id="stage" class="hidden flex-grow flex flex-col p-4 relative overflow-hidden">
                <div id="stage-content" class="flex-grow flex flex-col items-center justify-start space-y-4 pt-4"></div>
            </div>
        </main>

        <!-- 底部固定区 -->
        <footer id="stage-footer" class="hidden p-5 text-center flex-shrink-0 bg-white border-t-2 border-yellow-50 z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.03)]">
            <button onclick="backToMenu()" class="w-full py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl active:scale-95 transition text-lg">回到主页</button>
        </footer>
    </div>

    <script>
        const unitData = {
            1: {
                title: "第一单元：开学探险日",
                vocab: [
                    { word: '幼儿园', icon: '🏫' }, { word: '老师', icon: '👩‍🏫' }, { word: '同学', icon: '👦👧' }, 
                    { word: '课室', icon: '📝🪑' }, { word: '学习角落', icon: '📚🧸' }, { word: '电脑室', icon: '🖥️💻' },
                    { word: '办公室', icon: '🏢📠' }, { word: '厕所', icon: '🚻' }, { word: '游乐场', icon: '🎠' },
                    { word: '礼堂', icon: '🏛️' }, { word: '园长', icon: '👩‍💼' }, { word: '校车司机', icon: '👨‍✈️🚌' },
                    { word: '园工', icon: '👨‍🔧🧹' }
                ],
                sentences: [
                    { parts: ['这是', '我的', '幼儿园。'], colors: ['bg-red-400', 'bg-blue-400', 'bg-green-400'] },
                    { parts: ['幼儿园里', '有', '课室。'], colors: ['bg-pink-400', 'bg-orange-400', 'bg-indigo-400'] },
                    { parts: ['课室里', '有', '学习角落。'], colors: ['bg-purple-400', 'bg-yellow-500', 'bg-teal-400'] },
                    { parts: ['幼儿园里', '有', '电脑室', '和', '办公室。'], colors: ['bg-blue-400', 'bg-red-400', 'bg-green-400', 'bg-yellow-400', 'bg-pink-400'] },
                    { parts: ['游乐场', '旁边', '有', '厕所。'], colors: ['bg-orange-400', 'bg-teal-400', 'bg-blue-400', 'bg-red-400'] },
                    { parts: ['礼堂里', '有', '园长，', '老师和同学。'], colors: ['bg-blue-400', 'bg-green-400', 'bg-red-400', 'bg-purple-400'] }
                ],
                radical: { char: '宀', match: ['室', '家', '官', '客', '安', '守'], fail: ['园', '师', '学', '校', '工', '公'] }
            },
            2: {
                title: "第二单元：一起玩，真开心",
                vocab: [
                    { word: '打招呼', icon: '👋' }, { word: '牵手', icon: '🤝' }, { word: '轮流等待', icon: '🚶🚶' }, 
                    { word: '互相拥抱', icon: '🫂' }, { word: '分享玩具', icon: '👦👧🧸' }, { word: '玩具', icon: '🧸🧱火车🚂' }, 
                    { word: '玩耍', icon: '👦⚽' }, { word: '玩伴', icon: '🧒🧒' }
                ],
                sentences: [
                    { parts: ['他们', '是', '我的', '朋友。'], colors: ['bg-blue-400', 'bg-pink-400', 'bg-yellow-500', 'bg-green-400'] },
                    { parts: ['大家', '一起排队，', '轮流等待。'], colors: ['bg-red-400', 'bg-orange-400', 'bg-yellow-400'] },
                    { parts: ['我们', '一起玩耍，', '学习', '分享和拥抱。'], colors: ['bg-green-400', 'bg-blue-400', 'bg-indigo-400', 'bg-purple-400'] },
                    { parts: ['我和他', '是', '好朋友。'], colors: ['bg-indigo-400', 'bg-pink-400', 'bg-teal-400'] },
                    { parts: ['我们', '是', '好朋友。'], colors: ['bg-orange-400', 'bg-blue-400', 'bg-pink-400'] },
                    { parts: ['大家', '一起玩耍', '真开心。'], colors: ['bg-green-400', 'bg-red-400', 'bg-orange-400'] }
                ],
                radical: { char: '王', match: ['玩', '环', '现', '珠', '班', '球'], fail: ['打', '招', '呼', '友', '等', '开'] }
            }
        };

        let currentUnit = 1;
        let currentMode = '';
        let step = 0;
        let sessionData = [];
        let radicalFound = 0;
        let flippedCards = [];
        let matchedCount = 0;
        let isProcessing = false;
        let isMusicOn = false;

        let bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3'); 
        bgMusic.loop = true; bgMusic.volume = 0.05;
        const successAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
        const failAudio = new Audio('https://assets.mixkit.co/active_storage/sfx/951/951-preview.mp3');

        function speak(text, callback) {
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN'; utter.rate = 0.6;
            if (callback) utter.onend = callback;
            window.speechSynthesis.speak(utter);
        }

        function toggleMusic() {
            const btn = document.getElementById('music-btn');
            isMusicOn = !isMusicOn;
            if (isMusicOn) { bgMusic.play(); btn.innerText = '🔊'; }
            else { bgMusic.pause(); btn.innerText = '🔇'; }
        }

        function enterUnitSelection() {
            document.getElementById('start-page').classList.add('hidden');
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('unit-page').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
        }

        function selectUnit(u) {
            currentUnit = u;
            document.getElementById('unit-page').classList.add('hidden');
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('unit-info').innerText = "当前单元：第" + (u === 1 ? "一" : "二") + "单元";
        }

        function backToMenu() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('stage').classList.add('hidden');
            document.getElementById('stage-footer').classList.add('hidden');
            document.getElementById('progress-dots').classList.add('hidden');
            document.getElementById('auto-next-bar').style.width = '0%';
            if (isMusicOn) bgMusic.play();
        }

        function setupGame(mode) {
            currentMode = mode; step = 0; bgMusic.pause();
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('stage').classList.remove('hidden');
            document.getElementById('stage-footer').classList.remove('hidden');
            document.getElementById('progress-dots').classList.remove('hidden');
            
            const data = unitData[currentUnit];
            if (mode === 'sentence') { sessionData = [...data.sentences].sort(() => Math.random() - 0.5).slice(0, 5); }
            else if (mode === 'radical' || mode === 'memory') { sessionData = [1]; }
            else { sessionData = [...data.vocab].sort(() => Math.random() - 0.5).slice(0, 5); }
            renderStep();
        }

        function renderStep() {
            isProcessing = false;
            document.getElementById('auto-next-bar').style.width = '0%';
            const content = document.getElementById('stage-content');
            content.innerHTML = '';
            updateDots();
            const current = sessionData[step];

            if (currentMode === 'memory') renderMemoryFlip();
            else if (currentMode === 'circle') renderCircle(current);
            else if (currentMode === 'listening') renderListening(current);
            else if (currentMode === 'sentence') renderSentence(current);
            else if (currentMode === 'radical') renderRadical();
        }

        function updateDots() {
            const dots = document.querySelectorAll('.progress-dot');
            const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5;
            dots.forEach((dot, i) => {
                dot.classList.remove('dot-active', 'dot-done', 'hidden');
                if (i >= total) dot.classList.add('hidden');
                else if (i < step) dot.classList.add('dot-done');
                else if (i === step) dot.classList.add('dot-active');
            });
        }

        function triggerSuccessFeedback() {
            successAudio.currentTime = 0; successAudio.play().catch(()=>{});
            const bar = document.getElementById('auto-next-bar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            setTimeout(()=>{ bar.style.transition = 'width 1.5s linear'; bar.style.width = '100%'; }, 10);
            setTimeout(() => { 
                step++; 
                const total = (currentMode === 'memory' || currentMode === 'radical') ? 1 : 5; 
                if (step >= total) showVictory(); else renderStep(); 
            }, 1600);
        }

        function playError() {
            failAudio.currentTime = 0; failAudio.play().catch(()=>{});
        }

        function renderMemoryFlip() {
            flippedCards = []; matchedCount = 0;
            const pool = unitData[currentUnit].vocab;
            const chosen = [...pool].sort(() => Math.random() - 0.5).slice(0, 3);
            const cards = [];
            chosen.forEach(v => {
                cards.push({ type: 'icon', value: v.icon, matchId: v.word });
                cards.push({ type: 'word', value: v.word, matchId: v.word });
            });
            cards.sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="grid grid-cols-2 gap-4 p-1 w-full max-w-[300px]">
                    ${cards.map((c) => `
                        <div class="memory-card" data-match="${c.matchId}" onclick="handleCardClick(this)">
                            <div class="memory-card-inner">
                                <div class="card-front">?</div>
                                <div class="card-back">${c.value}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
                <p class="text-orange-500 font-bold text-center mt-3 animate-bounce text-lg">配配对吧！</p>
            `;
        }

        function handleCardClick(cardEl) {
            if (isProcessing || cardEl.classList.contains('is-flipped')) return;
            cardEl.classList.add('is-flipped');
            const matchId = cardEl.dataset.match;
            speak(matchId);
            flippedCards.push(cardEl);

            if (flippedCards.length === 2) {
                isProcessing = true;
                const [c1, c2] = flippedCards;
                if (c1.dataset.match === c2.dataset.match) {
                    setTimeout(() => {
                        matchedCount++; flippedCards = []; isProcessing = false;
                        if (matchedCount === 3) triggerSuccessFeedback();
                    }, 600);
                } else {
                    setTimeout(() => {
                        playError();
                        c1.classList.remove('is-flipped'); c2.classList.remove('is-flipped');
                        flippedCards = []; isProcessing = false;
                    }, 1000);
                }
            }
        }

        // --- 排句子：改进版 S 型紧凑路径 ---
        function renderSentence(data) {
            window.currentTempSentence = Array(data.parts.length).fill(null);
            const shuffled = [...data.parts].sort(() => Math.random() - 0.5);
            
            // 组装 S 型布局：头部居中，下方每行 2 个槽位
            let caterpillarHtml = `
                <div class="flex flex-col items-center w-full">
                    <div class="caterpillar-head-container wiggle">
                        <div class="antenna antenna-l"></div><div class="antenna antenna-r"></div>
                        <div class="caterpillar-face">
                            <div class="eye-container"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
                            <div class="smile"></div>
                        </div>
                    </div>
                    <div class="flex flex-col items-center">
            `;
            
            for (let i = 0; i < data.parts.length; i += 2) {
                // 每行两个槽位，形成 S 型摆动
                let rowDirection = (Math.floor(i / 2) % 2 === 0) ? 'flex-row' : 'flex-row-reverse';
                let rowShift = (Math.floor(i / 2) % 2 === 0) ? 'translate-x-3' : '-translate-x-3';
                
                caterpillarHtml += `<div class="flex ${rowDirection} ${rowShift} items-center">`;
                
                // 第一槽位
                caterpillarHtml += `
                    <div class="caterpillar-slot wiggle" id="slot-${i}" onclick="undoSentencePart(${i})" style="animation-delay: ${i * 0.1}s">
                        ${i + 1}
                    </div>
                `;
                
                // 第二槽位 (如果存在)
                if (i + 1 < data.parts.length) {
                    caterpillarHtml += `
                        <div class="caterpillar-slot wiggle" id="slot-${i+1}" onclick="undoSentencePart(${i+1})" style="animation-delay: ${(i+1) * 0.1}s">
                            ${i + 2}
                        </div>
                    `;
                }
                
                caterpillarHtml += `</div>`;
            }
            
            caterpillarHtml += `</div></div>`;

            document.getElementById('stage-content').innerHTML = `
                <div class="w-full flex flex-col items-center space-y-6">
                    <div class="w-full bg-blue-50/40 rounded-[2.5rem] py-4 px-2 border-2 border-dashed border-blue-100 flex justify-center">
                        ${caterpillarHtml}
                    </div>
                    <div class="flex flex-wrap gap-3 justify-center w-full px-2 max-h-[30vh] overflow-y-auto">
                        ${shuffled.map((word, idx) => `
                            <button id="sentence-btn-${idx}" onclick="handleSentenceClick(${idx}, '${word}', '${data.parts.join('')}')" 
                                    class="px-5 py-3 ${data.colors[data.parts.indexOf(word)] || 'bg-blue-400'} text-white font-bold rounded-2xl text-lg shadow-lg active:scale-90 transition">
                                ${word}
                            </button>
                        `).join('')}
                    </div>
                    <p class="text-xs text-blue-300">点击毛毛虫身上的字可以放回哦！</p>
                </div>
            `;
        }

        function handleSentenceClick(btnIdx, word, full) {
            if (isProcessing) return;
            speak(word);
            
            const emptyIdx = window.currentTempSentence.findIndex(s => s === null);
            if (emptyIdx === -1) return;

            const slot = document.getElementById(`slot-${emptyIdx}`);
            const btn = document.getElementById(`sentence-btn-${btnIdx}`);
            const colorClass = Array.from(btn.classList).find(c => c.startsWith('bg-'));
            
            slot.innerText = word; 
            slot.classList.add('filled', colorClass);
            slot.dataset.btnRef = btnIdx; 
            btn.classList.add('invisible', 'pointer-events-none');
            
            window.currentTempSentence[emptyIdx] = word;

            if (window.currentTempSentence.filter(x => x !== null).join('') === full) {
                isProcessing = true;
                setTimeout(() => { speak(full, () => triggerSuccessFeedback()); }, 800);
            }
        }

        window.undoSentencePart = function(slotIdx) {
            if (isProcessing) return;
            const slot = document.getElementById(`slot-${slotIdx}`);
            if (!slot.classList.contains('filled')) return;
            
            const btnIdx = slot.dataset.btnRef;
            const btn = document.getElementById(`sentence-btn-${btnIdx}`);
            
            speak("拿回来");
            btn.classList.remove('invisible', 'pointer-events-none');
            
            slot.innerText = slotIdx + 1;
            const colorClass = Array.from(slot.classList).find(c => c.startsWith('bg-'));
            slot.classList.remove('filled', colorClass);
            
            window.currentTempSentence[slotIdx] = null;
        };

        function renderCircle(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 1);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full space-y-6">
                    <div class="text-[4rem] p-6 bg-yellow-50 rounded-[2rem] border-4 border-dashed border-yellow-100 flex items-center justify-center min-h-[100px] shadow-inner">${target.icon}</div>
                    <div class="grid grid-cols-1 gap-4 w-full px-4">
                        ${options.map(opt => `
                            <button onclick="checkCircle(this, '${opt.word}', '${target.word}')" class="relative py-6 text-2xl font-bold bg-white border-2 border-gray-100 rounded-[2rem] active:scale-95 transition shadow-md">
                                ${opt.word}
                                <div class="circle-box hidden absolute inset-0"><svg class="circle-svg" viewBox="0 0 100 50"><ellipse cx="50" cy="25" rx="46" ry="22" class="circle-path" /></svg></div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function checkCircle(btn, selected, correct) {
            if (isProcessing) return;
            speak(selected);
            if (selected === correct) {
                isProcessing = true;
                btn.querySelector('.circle-box').classList.remove('hidden');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-300', 'text-red-400');
            }
        }

        function renderListening(target) {
            const pool = unitData[currentUnit].vocab;
            const distractors = pool.filter(v => v.word !== target.word).sort(() => Math.random() - 0.5).slice(0, 2);
            const options = distractors.concat(target).sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="flex flex-col items-center w-full space-y-8">
                    <button onclick="speak('${target.word}')" class="w-36 h-36 bg-blue-500 text-white rounded-full text-8xl shadow-xl active:scale-90 flex items-center justify-center border-4 border-white">🔊</button>
                    <div class="grid grid-cols-1 gap-4 w-full px-4">
                        ${options.map(opt => `
                            <button onclick="checkListening(this, '${opt.word}', '${target.word}')" class="py-6 text-2xl font-bold bg-white border-4 border-blue-50 rounded-[2rem] shadow-md">
                                ${opt.word}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;
            speak(target.word);
        }

        function checkListening(btn, selected, correct) {
            if (isProcessing) return;
            if (selected === correct) {
                isProcessing = true;
                btn.classList.add('bg-green-500', 'text-white');
                triggerSuccessFeedback();
            } else {
                playError();
                btn.classList.add('border-red-200', 'text-red-300');
            }
        }

        function renderRadical() {
            radicalFound = 0;
            const rData = unitData[currentUnit].radical;
            const pool = rData.match.map(c => ({char: c, isMatch: true}))
                          .concat(rData.fail.map(c => ({char: c, isMatch: false})))
                          .sort(() => Math.random() - 0.5);

            document.getElementById('stage-content').innerHTML = `
                <div class="text-center w-full space-y-8">
                    <p class="text-xl font-bold">找出带 <span class="text-5xl font-black text-red-500 mx-1">“${rData.char}”</span> 的字：</p>
                    <div class="grid grid-cols-3 gap-4 justify-items-center px-4">
                        ${pool.map(r => `
                            <button onclick="handleRadicalClick(this, ${r.isMatch})" 
                                    class="w-24 h-24 text-4xl font-bold bg-white border-2 border-pink-100 rounded-full flex items-center justify-center shadow-md active:scale-95 transition">
                                ${r.char}
                            </button>
                        `).join('')}
                    </div>
                    <div id="radical-status" class="text-xl text-pink-500 font-bold py-3 px-10 bg-pink-50 rounded-full inline-block">已找到：0 / 6</div>
                </div>
            `;
        }

        function handleRadicalClick(btn, isMatch) {
            if (btn.disabled || isProcessing) return;
            if (isMatch) {
                btn.disabled = true;
                btn.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                radicalFound++;
                document.getElementById('radical-status').innerText = `已找到：${radicalFound} / 6`;
                speak(btn.innerText);
                if (radicalFound >= 6) { isProcessing = true; triggerSuccessFeedback(); }
            } else {
                playError();
                btn.classList.add('opacity-40', 'bg-gray-100');
            }
        }

        function showVictory() {
            speak("你真棒！");
            document.getElementById('stage-content').innerHTML = `
                <div class="text-center p-4">
                    <div class="text-[9rem] animate-bounce mb-6">🏆</div>
                    <h2 class="text-4xl font-bold text-orange-500 mb-10">挑战成功！</h2>
                    <button onclick="backToMenu()" class="px-14 py-6 bg-yellow-400 text-blue-900 text-3xl font-bold rounded-[3rem] shadow-lg active:scale-95 transition">返回主页</button>
                </div>
            `;
            document.getElementById('progress-dots').classList.add('hidden');
        }
    </script>
</body>
</html>
